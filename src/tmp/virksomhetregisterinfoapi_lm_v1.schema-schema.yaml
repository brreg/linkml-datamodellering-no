  FrivilligRegistreringIMerverdiavgiftsregisteret:
    description: 2-3 § 2-3. Frivillig registrering (1) Næringsdrivende og offentlig
      virksomhet som leier ut bygg eller anlegg, kan frivillig registreres i Merverdiavgiftsregisteret
      dersom bygget eller anlegget brukes i virksomhet som er registrert etter denne
      loven, av offentlig virksomhet der øverste myndighet er kommunestyre, fylkesting
      eller annet styre eller råd etter kommuneloven eller kommunal særlovgivning,
      av interkommunale og interfylkeskommunale sammenslutninger organisert etter
      kommuneloven eller kommunal særlovgivning. Beløpsgrensene i § 2-1 gjelder tilsvarende.
      (2) Bortforpaktere av landbrukseiendom på minst fem dekar og utleiere av jordbruksarealer
      uten bygninger, kan frivillig registreres. (3) Næringsdrivende og offentlig
      virksomhet som driver utleie som nevnt i første eller annet ledd og er registrert
      i Merverdiavgiftsregisteret, anses som frivillig registrerte dersom leieforholdet
      behandles som merverdiavgiftspliktig. (4) Foreninger som har til formål å bygge
      og vedlikeholde skogsvei, kan frivillig registreres. (5) Utbyggere som utenfor
      næring oppfører vann- og avløpsanlegg i privat regi, kan frivillig registreres.
      Det er et vilkår at anlegget etter ferdigstillelsen overtas av noen som er registrert
      etter § 2-1 for virksomhet i vann- eller avløpssektoren. (6) Næringsdrivende
      og offentlig virksomhet som mot vederlag stiller baneanlegg til disposisjon
      for virksomhet som er registrert etter denne loven, kan frivillig registreres.
      Beløpsgrensene i § 2-1 gjelder tilsvarende.
    class_uri: generated:FrivilligRegistreringIMerverdiavgiftsregisteret
    annotations:
      begrepsidentifikator: https://concept-catalog.fellesdatakatalog.digdir.no/collections/TODO
    slots:
    - id
    - kategori
    - rekkefoelge
    slot_usage:
      kategori:
        required: true
        in_subset:
        - Obligatorisk
      rekkefoelge:
        required: true
        in_subset:
        - Obligatorisk
