version: 1

# Felt som MÅ vere til stades (severity: error)
required:
  schema:
    - id
    - name
  class: []
  slot: []

# Felt som BØR vere til stades (severity: warning)
recommended:
  schema:
    - description
  class:
    - description
  slot:
    - description

# Fellesklasser som skjemaet må bruke eller importere (tom = inga krav)
common_classes:
  must_use: []

# Generelle modelleringskvalitets-sjekkar
checks:

  all_classes_have_identifier:
    severity: warning
    description: >
      Alle klasser (unntatt tree_root) bør ha ein global identifikator — ein slot
      med identifier: true (eigen eller arva). Sikrar at instansar kan adresserast
      med URI i koblede data.
    check: all_classes_have_identifier

  all_classes_have_concept_ref:
    severity: warning
    description: >
      Alle klasser (unntatt tree_root) bør ha minst ein see_also-verdi som
      peiker på eit begrep i Felles begrepskatalog på forma
      https://data.norge.no/concepts/<id>. Sikrar omgrepsforankring og
      semantisk interoperabilitet.
    check: all_classes_have_concept_ref
    concept_catalog_uri: https://data.norge.no/concepts
