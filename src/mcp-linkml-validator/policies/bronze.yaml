version: 1

# Felt som MÅ vere til stades (severity: error)
required:
  schema:
    - id
    - name
    - title
  class: []
  slot: []

# Felt som BØR vere til stades (severity: warning)
recommended:
  schema:
    - description
    - version
  class:
    - description
  slot:
    - description

# Fellesklasser som skjemaet må bruke eller importere (tom = inga krav)
common_classes:
  must_use: []

# Generelle modelleringskvalitets-sjekkar
checks:

  schema_id_is_http_uri:
    severity: error
    description: >
      schema.id skal vere ein HTTP(S)-URI — persistent og globalt unik identifikator.
      Gjer skjemaet adresserbart og søkbart i katalogtenester.
    check: schema_id_is_http_uri
    digdir_rule: 4
    fair_principle: F1

  schema_has_default_prefix:
    severity: error
    description: >
      schema.default_prefix skal vere til stades. Utan default_prefix kan ikkje
      modellelement adresserast med persistente URI-ar (Digdir-regel 4: Identifiserbarhet).
    check: schema_field_present
    field: default_prefix
    digdir_rule: 4

  default_prefix_is_https_uri:
    severity: error
    description: >
      schema.default_prefix skal vere ein absolutt HTTPS-URI som sluttar med '/'.
      Sikrar at genererte element-URI-ar er globalt unike og persistente
      (Digdir-regel 4: Identifiserbarhet).
    check: default_prefix_is_https_uri
    digdir_rule: 4

  schema_has_license:
    severity: warning
    description: >
      schema.license bør vere til stades med URI til ein open lisens
      (t.d. CC BY 4.0). Støttar Digdir-regel 7 (Tilgjengeliggjøring) om at
      modellen skal vere fritt tilgjengeleg.
    check: schema_field_present
    field: license
    digdir_rule: 7
    fair_principle: R1.1

  class_names_pascal_case:
    severity: warning
    description: >
      Klassenamn skal starte med stor forbokstav (PascalCase). Følgjer
      Digdir-regel 3 (Navne- og skrivekonvensjoner) og gjer klasser
      skiljbare frå slot- og attributtnamn.
    check: class_names_pascal_case
    digdir_rule: 3

  slot_names_snake_case:
    severity: warning
    description: >
      Slotnamn skal bruke liten forbokstav og understrek (snake_case). Følgjer
      Digdir-regel 3 (Navne- og skrivekonvensjoner).
    check: slot_names_snake_case
    exclude_schemas:
      - fint-administrasjon
      - fint-arkiv
      - fint-common
      - fint-okonomi
      - fint-personvern
      - fint-ressurs
      - fint-utdanning
    digdir_rule: 3

  all_classes_have_class_uri:
    severity: warning
    description: >
      Alle klasser (unntatt tree_root) bør ha class_uri som mappar klassen til
      eit standard RDF-vokabular. Gjer klassane formelt beskriven og søkbare via URI.
    check: all_classes_have_class_uri
    digdir_rule: 4, 8
    fair_principle: F3, I1

  all_slots_have_slot_uri:
    severity: warning
    description: >
      Alle globale slots bør ha slot_uri som mappar eigenskapen til
      eit standard RDF-vokabular (dct:, dcat:, foaf: o.l.).
      Sikrar formal semantisk interoperabilitet.
    check: all_slots_have_slot_uri
    digdir_rule: 4, 8
    fair_principle: I1

  all_classes_have_identifier:
    severity: warning
    description: >
      Alle klasser (unntatt tree_root) bør ha ein global identifikator — ein slot
      med identifier: true (eigen eller arva). Sikrar at instansar kan adresserast
      med URI i koblede data.
    check: all_classes_have_identifier
    digdir_rule: 4
    fair_principle: F1

  class_count_limit:
    severity: warning
    description: >
      Skjema med fleire enn 50 klasser (unntatt tree_root) bør delast opp i
      undermoduler for å halde modellen handterleg. Støttar Digdir-regel 6
      (Modularitet) om handterleg mengd modellelement per modul.
    check: class_count
    max_classes: 50
    digdir_rule: 6

  all_classes_have_concept_ref:
    severity: warning
    description: >
      Alle klasser (unntatt tree_root) bør ha annotations.begrepsidentifikator
      som peikar på eit begrep i Felles begrepskatalog på forma
      https://concept-catalog.fellesdatakatalog.digdir.no/collections/<collection-id>/concepts/<concept-id>.
      Sikrar omgrepsforankring og semantisk interoperabilitet.
    check: all_classes_have_concept_ref
    concept_catalog_uri: https://concept-catalog.fellesdatakatalog.digdir.no/collections
    digdir_rule: 13
    fair_principle: A2
