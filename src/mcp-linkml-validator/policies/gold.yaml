version: 1
extends: silver

description: >
  FAIR-policy for LinkML-skjema. Sjekkar at skjemaet følgjer FAIR-prinsippa
  (Findable, Accessible, Interoperable, Reusable) for opne offentlege data.
  Arvar sølvlaget (ap-no) og bronselaget (default).
  Alle brot gir feil — gullstatus er krevjande å oppnå.

# Standard felt-sjekkar (lik default)
required:
  schema: [id, name]
  class: []
  slot: []

recommended:
  schema: [description]
  class: [description]
  slot: [description]

common_classes:
  must_use: []

# Oppgrader bronze-åtvarslane til feil på gullnivå.
# _merge_policies slår saman checks frå parent og child med {**parent, **child},
# slik at child-nøklar overstyrer parent-nøklar med same namn.
checks:
  all_classes_have_class_uri:
    severity: error
    description: >
      Alle klasser (unntatt tree_root) skal ha class_uri som mappar klassen til
      eit standard RDF-vokabular. Krev: ikkje berre anbefalt (bronze-nivå).
    check: all_classes_have_class_uri
    digdir_rule: 4, 8
    fair_principle: F3

  all_slots_have_slot_uri:
    severity: error
    description: >
      Alle globale slots skal ha slot_uri som mappar eigenskapen til
      eit standard RDF-vokabular. Krev: ikkje berre anbefalt (bronze-nivå).
    check: all_slots_have_slot_uri
    digdir_rule: 4, 8
    fair_principle: I1

# FAIR-sjekkar — alle brot gir feil (severity: error)
# Kvar sjekk er ein dict med:
#   principle   — FAIR-prinsipp (F1, F2, I1, R1.1, …)
#   severity    — error (alle krav på gullnivå)
#   description — kva sjekken validerer (lesbar utan å sjå i server.py)
#   check       — type sjekk (bestemmer kva funksjon som køyrast i server.py)
#   + eventuelle parametrar som check-funksjonen brukar
#
# Merk: F1 (schema_id_is_http_uri), F3 (all_classes_have_class_uri) og
# I1 (all_slots_have_slot_uri) er flytta til bronze.yaml og arva herifrå.
# Dei er oppgradert til error via checks-blokka ovanfor.
fair_checks:

  # F — Findable

  f2_title:
    principle: F2
    severity: error
    description: >
      schema.title skal vere sett. Tittel er ein del av rike metadata
      som gjer ressursen søkbar i katalogar.
    check: schema_field_present
    field: title
    digdir_rule: 1, 2
    fair_principle: F2

  f4_version:
    principle: F4
    severity: error
    description: >
      schema.version skal vere sett. Versjonering støttar katalogregistrering
      og sporbarheit av endringar over tid.
    check: schema_field_present
    field: version
    digdir_rule: 9
    fair_principle: F4

  # I — Interoperable

  i2_standard_prefixes:
    principle: I2
    severity: error
    description: >
      Skjemaet skal deklarere minst eitt standard vokabularprefiks.
      Standardvokabular sikrar interoperabilitet på tvers av system.
    check: schema_declares_standard_prefix
    standard_prefixes: [dct, dcat, skos, prov, rdf, rdfs, owl, foaf, xsd]
    digdir_rule: 8
    fair_principle: I2

  # R — Reusable

  r11_license:
    principle: R1.1
    severity: error
    description: >
      Skjemaet skal ha ein slot med dct:license som angir lisensinformasjon.
      Lisens er ein føresetnad for at data kan brukast på nytt av andre.
    check: schema_has_slot_with_uri
    match_any_uri:
      - dct:license
      - http://purl.org/dc/terms/license
    digdir_rule: 7
    fair_principle: R1.1

  r12_provenance:
    principle: R1.2
    severity: error
    description: >
      Skjemaet skal ha ein slot for proveniensinformasjon — opphav, opphavar
      eller utgjevar. Proveniens er viktig for tillit til og gjenbruk av data.
    check: schema_has_slot_with_uri
    match_any_uri:
      - prov:wasAttributedTo
      - prov:wasGeneratedBy
      - dct:creator
      - dct:publisher
      - dct:contributor
      - http://www.w3.org/ns/prov#wasAttributedTo
      - http://www.w3.org/ns/prov#wasGeneratedBy
      - http://purl.org/dc/terms/creator
      - http://purl.org/dc/terms/publisher
      - http://purl.org/dc/terms/contributor
    digdir_rule: 10
    fair_principle: R1.2
