version: 1
extends: bronze

description: >
  AP-NO-policy for LinkML-skjema. Sjekkar at skjemaet følgjer krava i
  DCAT-AP-NO og DQV-AP-NO for norsk offentleg sektor.
  Arvar bronselaget (default): grunnleggande metadata- og modelleringskrav.

required:
  schema: [id, name]
  class: []
  slot: []

recommended:
  schema: [description]
  class: [description]
  slot: [description]

common_classes:
  must_use: []

checks:

  # ── Livssyklusmetadata (Digdir-regel 9, 10, 11) ────────────────────────────

  schema_has_annotation_utgiver:
    severity: warning
    description: >
      schema.annotations.utgiver bør vere til stades med URI til ansvarleg
      organisasjon (https://data.norge.no/organizations/<orgnr>).
      Svarar til Informasjonsmodell.utgiver (dct:publisher) i ModelDCAT-AP-NO.
      Digdir-regel 10: Ansvar.
    check: schema_has_annotation
    annotation: utgiver
    value_pattern: "^https://data\\.norge\\.no/organizations/\\d+$"
    digdir_rule: 10
    fair_principle: R1.2

  schema_has_annotation_endringsdato:
    severity: warning
    description: >
      schema.annotations.endringsdato bør vere til stades (ISO 8601-dato).
      Svarar til Informasjonsmodell.endringsdato (dct:modified) i ModelDCAT-AP-NO.
      Digdir-regel 9: Datering.
    check: schema_has_annotation
    annotation: endringsdato
    digdir_rule: 9
    fair_principle: R1.3

  schema_has_annotation_oppdateringsfrekvens:
    severity: warning
    description: >
      schema.annotations.oppdateringsfrekvens bør vere til stades med ein URI frå
      EU sin Frequency Named Authority List (publications.europa.eu). Svarar til
      dct:accrualPeriodicity. Digdir-rettleiar for åpne data, punkt 6: Oppdaterte data —
      verksemda skal vere tydeleg på oppdateringsfrekvens.
    check: schema_has_annotation
    annotation: oppdateringsfrekvens
    value_pattern: "^http://publications\\.europa\\.eu/resource/authority/frequency/.+$"
    digdir_rule: 9
    fair_principle: R1.3

  schema_has_annotation_status:
    severity: warning
    description: >
      schema.annotations.status bør vere til stades med ein ADMS Status-URI.
      Svarar til Informasjonsmodell.status (adms:status) i ModelDCAT-AP-NO.
      Digdir-regel 11: Modellstatus.
    check: schema_has_annotation
    annotation: status
    allowed_values:
      - http://purl.org/adms/status/UnderDevelopment
      - http://purl.org/adms/status/Completed
      - http://purl.org/adms/status/Deprecated
      - http://purl.org/adms/status/Withdrawn
    digdir_rule: 11
    fair_principle: R1.3

  # ── Katalog (dcat:Catalog) ──────────────────────────────────────────────────

  katalog_beskrivelse:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:Catalog skal ha dct:description (beskrivelse). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Katalog
    slot_uri: dct:description
    digdir_rule: 1, 2
    fair_principle: F2

  katalog_kontaktpunkt:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:Catalog skal ha dcat:contactPoint (kontaktpunkt). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Katalog
    slot_uri: dcat:contactPoint
    digdir_rule: 10

  katalog_tittel:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:Catalog skal ha dct:title (tittel). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Katalog
    slot_uri: dct:title
    digdir_rule: 1, 2
    fair_principle: F2

  katalog_utgiver:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:Catalog skal ha dct:publisher (utgiver). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Katalog
    slot_uri: dct:publisher
    digdir_rule: 10
    fair_principle: R1.2

  # ── Katalogpost (dcat:CatalogRecord) ───────────────────────────────────────

  katalogpost_endringsdato:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:CatalogRecord skal ha dct:modified (endringsdato). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Katalogpost
    slot_uri: dct:modified
    digdir_rule: 9
    fair_principle: R1.3

  katalogpost_primaertema:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:CatalogRecord skal ha foaf:primaryTopic (primærtema). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Katalogpost
    slot_uri: foaf:primaryTopic

  # ── Datasett (dcat:Dataset) ─────────────────────────────────────────────────

  datasett_beskrivelse:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:Dataset skal ha dct:description (beskrivelse). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Datasett
    slot_uri: dct:description
    digdir_rule: 1, 2
    fair_principle: F2

  datasett_kontaktpunkt:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:Dataset skal ha dcat:contactPoint (kontaktpunkt). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Datasett
    slot_uri: dcat:contactPoint
    digdir_rule: 10

  datasett_tema:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:Dataset skal ha dcat:theme (tema). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Datasett
    slot_uri: dcat:theme

  datasett_tittel:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:Dataset skal ha dct:title (tittel). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Datasett
    slot_uri: dct:title
    digdir_rule: 1, 2
    fair_principle: F2

  datasett_utgiver:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:Dataset skal ha dct:publisher (utgiver). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Datasett
    slot_uri: dct:publisher
    digdir_rule: 10
    fair_principle: R1.2

  # ── Distribusjon (dcat:Distribution) ───────────────────────────────────────

  distribusjon_tilgangsurl:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:Distribution skal ha dcat:accessURL (tilgangsURL). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Distribusjon
    slot_uri: dcat:accessURL
    fair_principle: A1

  distribusjon_lisens:
    principle: Retningslinjer ved tilgjengeliggjøring av offentlige data
    severity: warning
    description: >
      dcat:Distribution bør ha dct:license (lisens) for offentlege data.
      Anbefalt, ikkje obligatorisk, i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Distribusjon
    slot_uri: dct:license
    digdir_rule: 7
    fair_principle: R1.1

  # ── Datatjeneste (dcat:DataService) ────────────────────────────────────────

  datatjeneste_endepunktsurl:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:DataService skal ha dcat:endpointURL (endepunktsURL). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Datatjeneste
    slot_uri: dcat:endpointURL
    fair_principle: A1

  datatjeneste_kontaktpunkt:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:DataService skal ha dcat:contactPoint (kontaktpunkt). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Datatjeneste
    slot_uri: dcat:contactPoint
    digdir_rule: 10

  datatjeneste_tittel:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:DataService skal ha dct:title (tittel). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Datatjeneste
    slot_uri: dct:title
    digdir_rule: 1, 2
    fair_principle: F2

  datatjeneste_utgiver:
    principle: DCAT-AP-NO
    severity: error
    description: dcat:DataService skal ha dct:publisher (utgiver). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Datatjeneste
    slot_uri: dct:publisher
    digdir_rule: 10
    fair_principle: R1.2

  # ── Aktør (foaf:Agent) ──────────────────────────────────────────────────────

  aktor_namn:
    principle: DCAT-AP-NO
    severity: error
    description: foaf:Agent skal ha foaf:name (namn). Obligatorisk i DCAT-AP-NO 2.
    check: class_has_slot_with_uri
    class: Aktør
    slot_uri: foaf:name
    digdir_rule: 1
    fair_principle: F2

  # ── Containerklasse-krav ────────────────────────────────────────────────────
  # Sjekkar at ein domenemodell som bruker AP-NO-profilene
  # eksponerer dei påkravde og anbefalte klassane via containerklassen (tree_root).

  container_katalog:
    principle: DCAT-AP-NO
    severity: error
    description: Containerklassen skal ha eit attributt med range Katalog (dcat:Catalog). Obligatorisk i DCAT-AP-NO 2.
    check: container_has_class
    class: Katalog

  container_datasett:
    principle: DCAT-AP-NO / DQV-AP-NO
    severity: error
    description: Containerklassen skal ha eit attributt med range Datasett (dcat:Dataset). Obligatorisk i DCAT-AP-NO 2 og DQV-AP-NO.
    check: container_has_class
    class: Datasett

  container_kvalitetsmaal:
    principle: DQV-AP-NO
    severity: error
    description: Containerklassen skal ha eit attributt med range Kvalitetsmaal (dqv:Metric). Obligatorisk i DQV-AP-NO.
    check: container_has_class
    class: Kvalitetsmaal

  container_kvalitetsmaaling:
    principle: DQV-AP-NO
    severity: error
    description: Containerklassen skal ha eit attributt med range Kvalitetsmaaling (dqv:QualityMeasurement). Obligatorisk i DQV-AP-NO.
    check: container_has_class
    class: Kvalitetsmaaling

  container_distribusjon:
    principle: DCAT-AP-NO
    severity: warning
    description: Containerklassen bør ha eit attributt med range Distribusjon (dcat:Distribution). Anbefalt i DCAT-AP-NO 2.
    check: container_has_class
    class: Distribusjon

  container_datatjeneste:
    principle: DCAT-AP-NO
    severity: warning
    description: Containerklassen bør ha eit attributt med range Datatjeneste (dcat:DataService). Anbefalt i DCAT-AP-NO 2.
    check: container_has_class
    class: Datatjeneste

  container_kvalitetsdimensjon:
    principle: DQV-AP-NO
    severity: warning
    description: Containerklassen bør ha eit attributt med range Kvalitetsdimensjon (dqv:Dimension). Anbefalt i DQV-AP-NO.
    check: container_has_class
    class: Kvalitetsdimensjon

  container_kvalitetsmerknad:
    principle: DQV-AP-NO
    severity: warning
    description: Containerklassen bør ha eit attributt med range Kvalitetsmerknad (dqv:QualityAnnotation). Anbefalt i DQV-AP-NO.
    check: container_has_class
    class: Kvalitetsmerknad
