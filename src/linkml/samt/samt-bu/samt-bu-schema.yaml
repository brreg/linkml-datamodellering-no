id: https://data.norge.no/samt/samt-bu
name: samt-bu
title: SAMT - Barnehagar og skular
version: "1.0.5"
license: https://data.norge.no/nlod/no/2.0
description: Ontodia-vennlig LinkML-modell for skoler

annotations:
  utgiver: https://data.norge.no/organizations/971032146
  endringsdato: "2026-07-03"
  utgivelsesdato: "2026-06-10"
  status: http://purl.org/adms/status/UnderDevelopment

prefixes:
  linkml:      https://w3id.org/linkml/
  samtbu:      https://data.norge.no/samt/samt-bu/
  samtbuskole: https://data.norge.no/samt/samt-bu/skole/
  org:         http://www.w3.org/ns/org#

default_prefix: https://data.norge.no/samt/samt-bu/
default_range: string

imports:
  - linkml:types
  - ../../ap-no/dqv-ap-no/dqv-ap-no-schema

classes:

  SamtBuContainer:
    description: Containerklasse for alle klasser som kan inngå i datasettet.
    tree_root: true
    attributes:
# metadata
      kontaktpunkter:
        range: Kontaktopplysning
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Kontaktpunkt som kan refereres til frå datasett.
      utgivere:
        range: Aktoer
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Utgivarar (organisasjonar) som kan refereres til frå datasett.
      organisasjoner:
        range: Aktoer
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Organisasjonar som kan refereres til frå andre klassar i datasamlinga.
      gjeldende_lovgivninger:
        range: RegulativRessurs
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Regulative ressursar (lovverk) som kan refereres til frå datasett.
      datasettdistribusjoner:
        range: Distribusjon
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Distribusjonar som kan refereres til frå datasett.
      dataset_metadata:
        range: Datasett
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Datasett med metadata om skoledata.
      kvalitetsmerknader:
        range: Kvalitetsmerknad
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Kvalitetsmerknader knytt til datasett.
      brukertilbakemeldinger:
        range: Brukartilbakemelding
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Brukartilbakemeldingar om datakvalitet.
      kvalitetsmaalinger:
        range: Kvalitetsmaaling
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Kvalitetsmålingar knytt til kvalitetsmål.
      grupper:
        range: Aktoer
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Grupper (aktørar) som kan refereres til frå andre klassar.
      standarder:
        range: Standard
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Standardar som datasett kan vere i samsvar med.
      kvalitetsdimensjoner:
        range: Kvalitetsdimensjon
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Kvalitetsdimensjonar som kvalitetsmerknader og -målingar kan referere til.
      tidsromer:
        range: Tidsrom
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Tidsrom som datasett kan referere til.
      tekstdeler:
        range: Tekstdel
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Tekstdelar (fritekstinnhold) i kvalitetsmerknader.
# data
      id:
        description: URI-identifikator for denne datasamlinga.
      skoler:
        range: Skole
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Skolar i datasamlinga.
      kommuner:
        range: Kommune
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Kommunar som kan vere skoleeigar.
      fylker:
        range: Fylke
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Fylker som kan vere skoleeigar.
      private_virksomheter:
        range: PrivatVirksomhet
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Private virksomheiter som kan vere skoleeigar.
      basisgrupper:
        range: Basisgruppe
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Basisgrupper (klasser/grupper) ved ein skole.
      elever:
        range: Elev
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Elevar i datasamlinga.
      rektorer:
        range: Rektor
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Rektorar i datasamlinga.
      kontaktlaerere:
        range: Kontaktlaerer
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Kontaktlærarar i datasamlinga.

  Skole:
    in_subset:
      - Obligatorisk
    class_uri: samtbuskole:Skole
    description: En skole er en privat eller offentlig institusjon eller et lærested hvor lærere underviser i ulike fag, oftest som grunnlag for videre utdannelse og yrkesliv.
    exact_mappings:
      - org:OrganizationalUnit
      - schema:EducationalOrganization
    slots:
      - id
      - navn
      - har_skoleeier
    see_also:
      - https://data.norge.no/concepts/fc9d0dda-71a2-3925-8688-52f849cf0f49
    annotations:
      begrepsidentifikator: https://concept-catalog.fellesdatakatalog.digdir.no/collections/964338531/concepts/017cdf77-afb1-44e3-8845-08fe570e251d

  # --- Abstrakt superklasse ---
  Skoleeier:
    in_subset:
      - Obligatorisk
    class_uri: samtbuskole:Skoleeier
    abstract: true
    exact_mappings:
      - foaf:Agent
    description: Superklasse for alle typer skoleeiere.
    slots:
      - id
      - navn
    see_also:
      - https://data.norge.no/concepts/91b83e9a-8beb-3747-b65c-238a2bef605a
    annotations:
      begrepsidentifikator: https://concept-catalog.fellesdatakatalog.digdir.no/collections/964338531/concepts/097edf00-cee3-4696-b9f1-80c5e66c72b1

  Kommune:
    class_uri: samtbuskole:Kommune
    exact_mappings:
      - org:Organization
    description: En kommune er et geografisk avgrenset område som utgjør en egen politisk og administrativ enhet innen en statsdannelse.
    is_a: Skoleeier
    slots:
      - kommunenummer
    see_also:
      - https://data.norge.no/concepts/5b7fd4f2-39f6-39ed-9540-e6c2491ef633
    annotations:
      begrepsidentifikator: https://concept-catalog.fellesdatakatalog.digdir.no/collections/974761076/concepts/20b2e0f1-9fe1-11e5-a9f8-e4115b280940

  Fylke:
    class_uri: samtbuskole:Fylke
    description: Fylke (etter norrønt fylki) er en betegnelse på et undernasjonalt, regionalt geografisk område, tilsvarende amt og len.
    exact_mappings:
      - org:Organization
    is_a: Skoleeier
    slots:
      - fylkesnummer

  PrivatVirksomhet:
    class_uri: samtbuskole:PrivatVirksomhet
    description: Virksomhet, eller foretak, er betegnelser for en juridisk person eller en organisasjon som produserer varer eller tjenester.
    exact_mappings:
      - org:Organization
      - schema:Organization
    is_a: Skoleeier
    slots:
      - organisasjonsnummer

  Basisgruppe:
    in_subset:
      - Anbefalt
    class_uri: samtbuskole:Basisgruppe
    description: Skoleklasse som hovedsaklig samler elever i ulike fag.
    close_mappings:
      - schema:EducationalOccupationalProgram
      - schema:Course
    slots:
      - id
      - navn
      - trinniva
      - del_av_skole

  Person:
    class_uri: samtbuskole:Person
    description: Eit menneske individ
    abstract: true
    exact_mappings:
      - foaf:Person
    slots:
      - id
      - navn
    see_also:
      - https://data.norge.no/concepts/9adf3e97-c9c2-3ee7-bc97-8f2a7e7fa69e
    annotations:
      begrepsidentifikator: https://concept-catalog.fellesdatakatalog.digdir.no/collections/971527404/concepts/6c1197a7-5c17-48f6-b399-a031d66cd8da

  Elev:
    in_subset:
      - Valgfri
    class_uri: samtbuskole:Elev
    description: En person som går på skole
    close_mappings:
      - schema:Student
    is_a: Person
    slots:
      - horer_til_basisgruppe

  Rektor:
    in_subset:
      - Obligatorisk
    class_uri: samtbuskole:Rektor
    description: Høgaste akademiske leder av en skole
    is_a: Person
    slots:
      - enhetsleder_for

  Kontaktlaerer:
    in_subset:
      - Anbefalt
    description: En lærer med ansvar for ei basisgruppe og er skolens kontaktpunkt for elevane i basisgruppa
    close_mappings:
      - schema:Teacher
    is_a: Person
    slots:
      - tilknyttet_basisgruppe
      - har_saerlig_ansvar_for
      - jobber_paa_skole
    see_also:
      - https://data.norge.no/concepts/59c7126f-7189-30f7-8dee-650cc9aa8762
    annotations:
      begrepsidentifikator: https://concept-catalog.fellesdatakatalog.digdir.no/collections/964338531/concepts/b298ea76-e465-4cb5-b54a-176e59374d37

slots:

  # --- Identifikator og namn ---
  # identifikator:
  #   identifier: true
  #   range: uriorcurie
  #   description: Global identifikator (CURIE/URI).

  navn:
    slot_uri: samtbuskole:navn
    range: string
    description: Namn på ressursen.

  # --- Metadata container slots (DCAT-AP-NO) ---
  # --- Domene container slots ---
  # --- Datatyper ---
  kommunenummer:
    description: Kommunenummer er en nummerrekke som identifiserer kommuner eller kommunefrie områder. 
    slot_uri: dcat:identifier
    close_mappings:
      - skos:notation
    range: string

  fylkesnummer:
    description: Fylkesnummer er definerte identifikasjonskoder for Norges fylker og to territorier (Svalbard og Jan Mayen).
    slot_uri: dcat:identifier
    close_mappings:
      - skos:notation
    range: string

  organisasjonsnummer:
    description: Organisasjonsnummer er i Norge et ni-sifret registreringsnummer som tildeles av Enhetsregisteret ved Brønnøysundregistrene for en organisasjon (foretak, idrettslag og lignende).
    slot_uri: dct:identifier
    exact_mappings:
      - adms:identifier
    range: string

  trinniva:
    slot_uri: samtbuskole:trinniva
    description: Grunnskolen (6-15 år) er delt opp i 10 trinn, eit for kvart år.
    range: string

  # --- Relasjoner ---
  har_skoleeier:
    slot_uri: samtbuskole:harSkoleeier
    description: Skoleeier for skolen
    exact_mappings:
      - org:hasUnit
    domain: Skole
    range: Skoleeier

  del_av_skole:
    description: Skolen basisgruppa tilhører
    slot_uri: org:unitOf
    close_mappings:
      - schema:isPartOf
    domain: Basisgruppe
    range: Skole


  horer_til_basisgruppe:
    slot_uri: samtbuskole:horerTilBasisgruppe
    description: Basisgruppe elev tilhører
    close_mappings:
      - schema:memberOf
    domain: Elev
    range: Basisgruppe


  enhetsleder_for:
    slot_uri: samtbuskole:enhetslederFor
    description: Enhet rektor er enhetsleder for
    close_mappings:
      - org:headOf
    domain: Rektor
    range: Skole


  tilknyttet_basisgruppe:
    slot_uri: samtbuskole:tilknyttetBasisgruppe
    description: Basisgruppe kontaktlærer er tilknyttet
    close_mappings:
      - schema:teaches
    domain: Kontaktlaerer
    range: Basisgruppe


  har_saerlig_ansvar_for:
    slot_uri: samtbuskole:harSaerligAnsvarFor
    description: Elev kontaktlæreren har særlig ansvar for
    domain: Kontaktlaerer
    range: Elev


  jobber_paa_skole:
    slot_uri: samtbuskole:jobberPaaSkole
    description: Skolen kontaktlæreren jobber på
    close_mappings:
      - schema:worksFor
      - org:memberOf
    domain: Kontaktlaerer
    range: Skole