id: https://data.norge.no/linkml/brreg-modelkatalog
name: brreg-modelkatalog
title: Brønnøysundregistra – Modelkatalog
description: >-
  Modelkatalog for Brønnøysundregistra sine informasjonsmodellar.
  Implementerer ModelDCAT-AP-NO direkte via import.
version: "1.0.0"

prefixes:
  linkml:       https://w3id.org/linkml/
  modelldcatno: https://data.norge.no/vocabulary/modelldcatno#
  dcat:         http://www.w3.org/ns/dcat#
  dct:          http://purl.org/dc/terms/

default_prefix: https://data.norge.no/linkml/brreg-modelkatalog/
default_range: string

imports:
  - linkml:types
  - ../../ap-no/modelldcat-ap-no/modelldcat-ap-no-schema

classes:

  ModelkatalogContainer:
    tree_root: true
    attributes:
      modelkatalogar:
        range: Modelkatalog
        multivalued: true
        inlined: true
        inlined_as_list: true
      informasjonsmodellar:
        range: Informasjonsmodell
        multivalued: true
        inlined: true
        inlined_as_list: true
      objekttypar:
        range: Objekttype
        multivalued: true
        inlined: true
        inlined_as_list: true
      kodelister:
        range: Kodeliste
        multivalued: true
        inlined: true
        inlined_as_list: true
      eigenskapar:
        range: Eigenskap
        multivalued: true
        inlined: true
        inlined_as_list: true
      aktorer:
        range: Aktor
        multivalued: true
        inlined: true
        inlined_as_list: true
      kontaktpunkt:
        range: Kontaktopplysning
        multivalued: true
        inlined: true
        inlined_as_list: true
