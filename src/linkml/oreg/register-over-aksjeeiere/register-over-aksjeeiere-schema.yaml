    inlined_as_list: true

  eierskapstransaksjoner:
    description: Samling av eigarskapstransaksjonar.
    domain: Containerklasse
    range: Eierskapstransaksjon
    multivalued: true
    inlined: true
    inlined_as_list: true

  aksjeoverdragelser:
