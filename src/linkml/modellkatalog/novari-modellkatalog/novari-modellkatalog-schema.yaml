id: https://data.norge.no/modellkatalog/novari-modellkatalog
name: novari-modellkatalog
title: Novari IKS - Modellkatalog (FINT)
description: >-
  Modellkatalog for Novari IKS sine informasjonsmodellar.
  Implementerer ModelDCAT-AP-NO direkte via import.
version: "1.0.0"

annotations:
  status: http://purl.org/adms/status/UnderDevelopment

prefixes:
