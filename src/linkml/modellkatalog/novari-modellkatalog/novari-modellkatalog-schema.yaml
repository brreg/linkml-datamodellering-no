        inlined: true
        inlined_as_list: true
      enkeltyper:
        range: Enkeltype
        multivalued: true
        inlined: true
        inlined_as_list: true
      attributter:
        range: Attributt
        multivalued: true
        inlined: true
        inlined_as_list: true
      assosiasjoner:
        range: Assosiasjon
        multivalued: true
        inlined: true
        inlined_as_list: true
      aktoerer:
        range: Aktoer
        multivalued: true
        inlined: true
        inlined_as_list: true
      kontaktpunkt:
