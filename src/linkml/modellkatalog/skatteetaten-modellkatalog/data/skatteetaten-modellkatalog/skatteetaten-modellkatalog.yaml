- id: https://data.norge.no/modellkatalog/skatteetaten-modellkatalog/ngr-person/Foedselsnummer
  tittel:
  - Foedselsnummer
  beskrivelse:
  - Elleve-sifra fødselsnummer tildelt norske statsborgarar og personar med fast opphald
    i Noreg.
  har_egenskap:
  - https://data.norge.no/modellkatalog/skatteetaten-modellkatalog/ngr-person/Foedselsnummer/identifikatornummer
- id: https://data.norge.no/modellkatalog/skatteetaten-modellkatalog/ngr-person/DNummer
  tittel:
  - DNummer
  beskrivelse:
  - Elleve-sifra D-nummer tildelt utanlandske personar med mellombels opphald i Noreg
    (t.d. med d-nummer, om dei har midlertidig eller permanent opphald). Brukes om
    de har midlertidig eller ikkje har permanent opphald.
  har_egenskap:
  - https://data.norge.no/modellkatalog/skatteetaten-modellkatalog/ngr-person/DNummer/identifikatornummer
