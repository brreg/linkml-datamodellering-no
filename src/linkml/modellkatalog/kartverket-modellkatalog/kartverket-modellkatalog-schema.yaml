id: https://data.norge.no/modellkatalog/kartverket-modellkatalog
name: kartverket-modellkatalog
title: Kartverket – Modellkatalog
description: >-
  Modellkatalog for Kartverket sine informasjonsmodellar.
  Implementerer ModelDCAT-AP-NO direkte via import.
version: "1.0.0"

prefixes:
  linkml:       https://w3id.org/linkml/
  modelldcatno: https://data.norge.no/vocabulary/modelldcatno#
  dcat:         http://www.w3.org/ns/dcat#
  dct:          http://purl.org/dc/terms/

default_prefix: https://data.norge.no/modellkatalog/kartverket-modellkatalog/
default_range: string

imports:
  - linkml:types
  - ../../ap-no/modelldcat-ap-no/modelldcat-ap-no-schema

classes:

  ModellkatalogContainer:
    tree_root: true
    attributes:
      modellkataloger:
        range: Modellkatalog
        multivalued: true
        inlined: true
        inlined_as_list: true
      informasjonsmodeller:
        range: Informasjonsmodell
        multivalued: true
        inlined: true
        inlined_as_list: true
      objekttyper:
        range: Objekttype
        multivalued: true
        inlined: true
        inlined_as_list: true
      kodelister:
        range: Kodeliste
        multivalued: true
        inlined: true
        inlined_as_list: true
      egenskaper:
        range: Egenskap
        multivalued: true
        inlined: true
        inlined_as_list: true
      aktoerer:
        range: Aktoer
        multivalued: true
        inlined: true
        inlined_as_list: true
      kontaktpunkt:
        range: Kontaktopplysning
        multivalued: true
        inlined: true
        inlined_as_list: true
