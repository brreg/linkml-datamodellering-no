id: https://data.norge.no/ap-no/modelldcat-ap-no/modell
name: modelldcat-modell
title: ModelDCAT-AP-NO – Modelldel
description: >-
  Modellelement-klasser frå ModelDCAT-AP-NO: Objekttype, Datatype, Kodeliste,
  Egenskap og alle subklassar, samt Kodeelement.
  Basert på https://data.norge.no/specification/modelldcat-ap-no#Modeldel

version: "1.0.0"
license: https://data.norge.no/nlod/no/2.0

prefixes:
  linkml:        https://w3id.org/linkml/
  modelldcatno:  https://data.norge.no/vocabulary/modelldcatno#
  dct:           http://purl.org/dc/terms/
  skos:          http://www.w3.org/2004/02/skos/core#
  xsd:           http://www.w3.org/2001/XMLSchema#
  xkos:          http://rdf-vocabulary.ddialliance.org/xkos#

default_prefix: https://data.norge.no/ap-no/modelldcat-ap-no/modell/
default_range: string

imports:
  - linkml:types
  - ../common/common-ap-no-schema

# ---------------------------------------------------------------------------
# Klasser — Modelldel
# ---------------------------------------------------------------------------

classes:

  # ---- Modellelement (abstrakt) --------------------------------------------

  Modellelement:
    in_subset:
      - Metadata
    abstract: true
    class_uri: modelldcatno:ModelElement
    description: Abstrakt basisklasse for alle modellelement i ein informasjonsmodell.
    slots:
      - id
      - tittel
      - begrep
      - identifikator_literal
      - har_egenskap
      - beskrivelse
      - tilhoerer_modul
    slot_usage:
      tittel:
        in_subset:
          - Obligatorisk
      begrep:
        in_subset:
          - Anbefalt
      identifikator_literal:
        in_subset:
          - Anbefalt
      har_egenskap:
        in_subset:
          - Anbefalt
      beskrivelse:
        in_subset:
          - Valgfri
      tilhoerer_modul:
        in_subset:
          - Valgfri

  # ---- Subklassar av Modellelement -----------------------------------------

  Objekttype:
    in_subset:
      - Metadata
    is_a: Modellelement
    class_uri: modelldcatno:ObjectType
    description: Ein objekttype — ein klasse med eigenskapar i informasjonsmodellen.

  Rotobjekttype:
    in_subset:
      - Metadata
    is_a: Modellelement
    class_uri: modelldcatno:RootObjectType
    description: Ein rotobjekttype — toppnivå-klasse i informasjonsmodellen.

  Datatype:
    in_subset:
      - Metadata
    is_a: Modellelement
    class_uri: modelldcatno:DataType
    description: Ein datatype — ein strukturert samansett type.

  Enkeltype:
    in_subset:
      - Metadata
    is_a: Modellelement
    class_uri: modelldcatno:SimpleType
    description: Ein enkel type med restriksjonar (xsd-fasettar).
    slots:
      - typedefinisjon
      - antall_desimaler
      - lengde
      - maksimum_ikke_inklusivt
      - maksimum_inklusivt
      - maks_lengde
      - minimum_ikke_inklusivt
      - minimum_inklusivt
      - minimum_lengde
      - moenster
      - totalt_antall_siffer
    slot_usage:
      typedefinisjon:
        in_subset:
          - Anbefalt

  Kodeliste:
    in_subset:
      - Metadata
    is_a: Modellelement
    class_uri: modelldcatno:CodeList
    description: Ei kodeliste — eit kontrollert vokabular av tillate verdiar.
    slots:
      - har_referanse

  Modul:
    in_subset:
      - Metadata
    is_a: Modellelement
    class_uri: modelldcatno:Module
    description: Ein modul som grupperer modellelement i informasjonsmodellen.

  # ---- Eigenskap (abstrakt) ------------------------------------------------

  Egenskap:
    in_subset:
      - Metadata
    abstract: true
    class_uri: modelldcatno:Property
    description: Abstrakt basisklasse for eigenskapar knytt til eit modellelement.
    slots:
      - id
      - begrep
      - identifikator_literal
      - navigerbar
      - nedre_multiplisitet
      - tittel
      - oevre_multiplisitet
      - beskrivelse
      - har_type
      - relasjonsegenskapsnavn
      - sekvensnummer
      - tilhoerer_modul
      - utgjor_symmetrisk_relasjon_med
    slot_usage:
      begrep:
        in_subset:
          - Anbefalt
      identifikator_literal:
        in_subset:
          - Anbefalt
      navigerbar:
        in_subset:
          - Anbefalt
      nedre_multiplisitet:
        in_subset:
          - Anbefalt
      tittel:
        in_subset:
          - Anbefalt
      oevre_multiplisitet:
        in_subset:
          - Anbefalt
      beskrivelse:
        in_subset:
          - Valgfri
      har_type:
        in_subset:
          - Valgfri
      relasjonsegenskapsnavn:
        in_subset:
          - Valgfri
      sekvensnummer:
        in_subset:
          - Valgfri
      tilhoerer_modul:
        in_subset:
          - Valgfri
      utgjor_symmetrisk_relasjon_med:
        in_subset:
          - Valgfri

  # ---- Subklassar av Eigenskap ---------------------------------------------

  Attributt:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Attribute
    description: Ein attributt — ein eigenskap med ein datatype eller enkel type som verdi.
    slots:
      - har_datatype
      - har_enkel_type
      - har_verdi_fra
      - inneholder_objekttype
    slot_usage:
      har_datatype:
        in_subset:
          - Anbefalt
      har_enkel_type:
        in_subset:
          - Anbefalt
      har_verdi_fra:
        in_subset:
          - Anbefalt
      inneholder_objekttype:
        in_subset:
          - Anbefalt

  Assosiasjon:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Association
    description: Ein assosiasjon — ein eigenskap som refererer til eit anna modellelement.
    slots:
      - refererer_til
    slot_usage:
      refererer_til:
        in_subset:
          - Anbefalt

  Rolle:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Role
    description: Ein rolle — ein eigenskap som knyter ein objekttype til ein assosiasjon.
    slots:
      - har_objekttype
    slot_usage:
      har_objekttype:
        in_subset:
          - Anbefalt

  Spesialisering:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Specialization
    description: Ein spesialisering — eit arveforhold frå eit spesielt til eit generelt modellelement.
    slots:
      - har_generelt_begrep
    slot_usage:
      har_generelt_begrep:
        in_subset:
          - Anbefalt

  Komposisjon:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Composition
    description: Ein sammensetning — ein sterk eigarelskapsrelasjon mellom modellelement.
    slots:
      - inneholder
    slot_usage:
      inneholder:
        in_subset:
          - Anbefalt

  Realisering:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Realization
    description: Ein realisering — ein implementasjonsrelasjon mellom modellelement.
    slots:
      - har_leverandoer
    slot_usage:
      har_leverandoer:
        in_subset:
          - Anbefalt

  Abstraksjon:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Abstraction
    description: Ein abstraksjon — ein forenkling som representerer eit modellelement.
    slots:
      - er_abstraksjon_av
    slot_usage:
      er_abstraksjon_av:
        in_subset:
          - Anbefalt

  Avhengighet:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Dependency
    description: Ein avhengighet — ein relasjon der det eine modellelementet avheng av det andre.
    slots:
      - avhengig_av
    slot_usage:
      avhengig_av:
        in_subset:
          - Anbefalt

  Samling:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Collection
    description: Ein samling — ein eigenskap som representerer ei uordna mengd av modellelement.

  Valg:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Choice
    description: Eit val — ein eigenskap som representerer eit val mellom modellelement.
    slots:
      - har_noe
    slot_usage:
      har_noe:
        in_subset:
          - Anbefalt

  Alle:
    in_subset:
      - Metadata
    is_a: Valg
    class_uri: modelldcatno:AllOf
    description: Alle av — alle modellelementa i lista må gjelde (logisk OG-mengd).

  NoenAv:
    in_subset:
      - Metadata
    is_a: Valg
    class_uri: modelldcatno:AnyOf
    description: Nokon av — minst eitt modellelement i lista må gjelde (logisk ELLER-mengd).

  # ---- Merknad og betingelsesreglar ----------------------------------------

  Note:
    in_subset:
      - Metadata
    class_uri: modelldcatno:Note
    description: Ei merknad knytt til eit modellelement eller eigenskap.
    slots:
      - id
      - annoterer
      - egenskapsmerknad
      - identifikator_literal
      - tittel
      - tilhoerer_modul
    slot_usage:
      annoterer:
        in_subset:
          - Anbefalt
      egenskapsmerknad:
        in_subset:
          - Anbefalt
      identifikator_literal:
        in_subset:
          - Anbefalt
      tittel:
        in_subset:
          - Anbefalt
      tilhoerer_modul:
        in_subset:
          - Valgfri

  Begrensningsregel:
    in_subset:
      - Metadata
    is_a: Note
    class_uri: modelldcatno:ConstraintRule
    description: Ein betingelsesregel — ei formell avgrensing på modellelement eller eigenskapar.
    slots:
      - begrenser
      - begrensningsuttrykk
    slot_usage:
      begrenser:
        required: true
        in_subset:
          - Obligatorisk
      begrensningsuttrykk:
        in_subset:
          - Anbefalt

  Og:
    in_subset:
      - Metadata
    is_a: Begrensningsregel
    class_uri: modelldcatno:And
    description: Og — logisk OG-betingelse; alle deltakande modellelement må gjelde.

  Eller:
    in_subset:
      - Metadata
    is_a: Begrensningsregel
    class_uri: modelldcatno:Or
    description: Eller — logisk ELLER-betingelse; minst eitt modellelement må gjelde.

  EntenEller:
    in_subset:
      - Metadata
    is_a: Begrensningsregel
    class_uri: modelldcatno:Xor
    description: Xor — eksklusiv ELLER-betingelse; nøyaktig eitt modellelement må gjelde.

  Ikke:
    in_subset:
      - Metadata
    is_a: Begrensningsregel
    class_uri: modelldcatno:Not
    description: Ikkje — negasjon; modellelementet det refererer til må ikkje gjelde.

  # ---- Kodeelement ---------------------------------------------------------

  Kodeelement:
    in_subset:
      - Metadata
    class_uri: modelldcatno:CodeElement
    description: Eit element i ei kodeliste (modelldcatno:CodeElement).
    slots:
      - id
      - i_kodeliste
      - kode
      - anbefalt_kodetekst
      - begrep
      - identifikator_literal
      - toppelement_til
      - definisjon
      - eksempel
      - eksklusjonsmerknad
      - forrige_kodeelement
      - fraradet_kodetekst
      - inklusjonsmerknad
      - merknad
      - neste_kodeelement
      - omfangsmerknad
      - tillatt_kodetekst
    slot_usage:
      i_kodeliste:
        required: true
        in_subset:
          - Obligatorisk
      kode:
        required: true
        in_subset:
          - Obligatorisk
      anbefalt_kodetekst:
        in_subset:
          - Anbefalt
      begrep:
        in_subset:
          - Anbefalt
      identifikator_literal:
        in_subset:
          - Anbefalt
      toppelement_til:
        in_subset:
          - Anbefalt

# ---------------------------------------------------------------------------
# Slots — Modelldel
# ---------------------------------------------------------------------------

slots:

  # ---- Modellelement -------------------------------------------------------

  begrep:
    slot_uri: dct:subject
    range: Konsept
    multivalued: true
    description: Fagomgrep ressursen handlar om (dct:subject).

  har_egenskap:
    slot_uri: modelldcatno:hasProperty
    range: Egenskap
    multivalued: true
    description: Eigenskapar modellelementet har (modelldcatno:hasProperty).

  tilhoerer_modul:
    slot_uri: modelldcatno:belongsToModule
    range: Modul
    multivalued: true
    description: Modul dette elementet tilhører (modelldcatno:belongsToModule).

  # ---- Eigenskap -----------------------------------------------------------

  navigerbar:
    slot_uri: modelldcatno:navigable
    range: boolean
    description: Om eigenskapen er navigerbar i begge retningar (modelldcatno:navigable).

  nedre_multiplisitet:
    slot_uri: modelldcatno:minOccurs
    range: NonNegativeInteger
    description: Minste multiplisitet for eigenskapen (modelldcatno:minOccurs).

  oevre_multiplisitet:
    slot_uri: modelldcatno:maxOccurs
    range: string
    description: Høgste multiplisitet — heltalstal, "n" eller "*" (modelldcatno:maxOccurs).

  relasjonsegenskapsnavn:
    slot_uri: modelldcatno:relationPropertyLabel
    range: LangString
    multivalued: true
    description: Lesetekst for eigenskapen i ein relasjon (modelldcatno:relationPropertyLabel).

  sekvensnummer:
    slot_uri: modelldcatno:sequenceNumber
    range: NonNegativeInteger
    description: Sekvensnummer for eigenskapen i modellelementet (modelldcatno:sequenceNumber).

  utgjor_symmetrisk_relasjon_med:
    slot_uri: modelldcatno:formsSymmetryWith
    range: Egenskap
    description: Eigenskap som denne eigenskapen dannar symmetri med (modelldcatno:formsSymmetryWith).

  har_type:
    slot_uri: modelldcatno:hasType
    range: Modellelement
    multivalued: true
    description: Type modellelement for eigenskapen (modelldcatno:hasType).

  # ---- Attributt -----------------------------------------------------------

  har_datatype:
    slot_uri: modelldcatno:hasDataType
    range: Datatype
    multivalued: true
    description: Datatype for attributten (modelldcatno:hasDataType).

  har_enkel_type:
    slot_uri: modelldcatno:hasSimpleType
    range: Enkeltype
    multivalued: true
    description: Enkel type for attributten (modelldcatno:hasSimpleType).

  har_verdi_fra:
    slot_uri: modelldcatno:hasValueFrom
    range: Kodeliste
    multivalued: true
    description: Kodeliste for tillate verdiar til attributten (modelldcatno:hasValueFrom).

  inneholder_objekttype:
    slot_uri: modelldcatno:containsObjectType
    range: Objekttype
    multivalued: true
    description: Objekttype som attributten inneheld (modelldcatno:containsObjectType).

  # ---- Assosiasjon ---------------------------------------------------------

  refererer_til:
    slot_uri: modelldcatno:refersTo
    range: Modellelement
    description: Modellelement som eigenskapen refererer til (modelldcatno:refersTo).

  # ---- Rolle ---------------------------------------------------------------

  har_objekttype:
    slot_uri: modelldcatno:hasObjectType
    range: Objekttype
    description: Objekttype knytt til rolla (modelldcatno:hasObjectType).

  # ---- Spesialisering ------------------------------------------------------

  har_generelt_begrep:
    slot_uri: modelldcatno:hasGeneralConcept
    range: Modellelement
    description: Det generelle modellelementet i ei spesialisering (modelldcatno:hasGeneralConcept).

  # ---- Sammensetning -------------------------------------------------------

  inneholder:
    slot_uri: modelldcatno:contains
    range: Modellelement
    description: Modellelement som er del av samansetjinga (modelldcatno:contains).

  # ---- Realisering ---------------------------------------------------------

  har_leverandoer:
    slot_uri: modelldcatno:hasSupplier
    range: Modellelement
    description: Leverandør-modellelement i realiseringa (modelldcatno:hasSupplier).

  # ---- Abstraksjon ---------------------------------------------------------

  er_abstraksjon_av:
    slot_uri: modelldcatno:isAbstractionOf
    range: Modellelement
    description: Modellelement denne abstraksjonen representerer (modelldcatno:isAbstractionOf).

  # ---- Avhengighet ---------------------------------------------------------

  avhengig_av:
    slot_uri: modelldcatno:dependentOn
    range: Modellelement
    description: Modellelement dette elementet avheng av (modelldcatno:dependentOn).

  # ---- Valg ----------------------------------------------------------------

  har_noe:
    slot_uri: modelldcatno:hasSome
    range: Modellelement
    multivalued: true
    description: Modellelement som inngår i valet (modelldcatno:hasSome).

  # ---- EnkelType -----------------------------------------------------------

  typedefinisjon:
    slot_uri: modelldcatno:typeDefinitionReference
    range: uri
    description: Referanse til typedefinisjon (modelldcatno:typeDefinitionReference).

  antall_desimaler:
    slot_uri: xsd:fractionDigits
    range: NonNegativeInteger
    description: Maks tal på desimalsiffer (xsd:fractionDigits).

  lengde:
    slot_uri: xsd:length
    range: NonNegativeInteger
    description: Nøyaktig lengd av strengen (xsd:length).

  maksimum_ikke_inklusivt:
    slot_uri: xsd:maxExclusive
    range: string
    description: Eksklusiv maksimumsverdi (xsd:maxExclusive).

  maksimum_inklusivt:
    slot_uri: xsd:maxInclusive
    range: string
    description: Inklusiv maksimumsverdi (xsd:maxInclusive).

  maks_lengde:
    slot_uri: xsd:maxLength
    range: NonNegativeInteger
    description: Maksimal lengd av strengen (xsd:maxLength).

  minimum_ikke_inklusivt:
    slot_uri: xsd:minExclusive
    range: string
    description: Eksklusiv minimumsverdi (xsd:minExclusive).

  minimum_inklusivt:
    slot_uri: xsd:minInclusive
    range: string
    description: Inklusiv minimumsverdi (xsd:minInclusive).

  minimum_lengde:
    slot_uri: xsd:minLength
    range: NonNegativeInteger
    description: Minimal lengd av strengen (xsd:minLength).

  moenster:
    slot_uri: xsd:pattern
    range: string
    description: Regulært uttrykk for tillate strengverdiar (xsd:pattern).

  totalt_antall_siffer:
    slot_uri: xsd:totalDigits
    range: NonNegativeInteger
    description: Maks totalt tal på siffer (xsd:totalDigits).

  # ---- Kodeelement ---------------------------------------------------------

  i_kodeliste:
    slot_uri: skos:inScheme
    range: Kodeliste
    multivalued: true
    description: Kodeliste dette kodeelementet tilhører (skos:inScheme).

  kode:
    slot_uri: skos:notation
    range: string
    description: Kode for kodeelementet (skos:notation).

  anbefalt_kodetekst:
    slot_uri: skos:prefLabel
    range: LangString
    multivalued: true
    description: Anbefalt kodetekst for kodeelementet (skos:prefLabel).

  toppelement_til:
    slot_uri: skos:topConceptOf
    range: Kodeliste
    multivalued: true
    description: Kodeliste dette kodeelementet er et toppkonsept av (skos:topConceptOf).

  definisjon:
    slot_uri: skos:definition
    range: LangString
    multivalued: true
    description: Definisjon av kodeelementet (skos:definition).

  eksempel:
    slot_uri: skos:example
    range: LangString
    multivalued: true
    description: Eksempel på bruk av kodeelementet (skos:example).

  eksklusjonsmerknad:
    slot_uri: xkos:exclusionNote
    range: LangString
    multivalued: true
    description: Notat om kva som er ekskludert frå kodeelementet (xkos:exclusionNote).

  forrige_kodeelement:
    slot_uri: xkos:previous
    range: Kodeelement
    description: Forrige kodeelement i en ordnet kodeliste (xkos:previous).

  fraradet_kodetekst:
    slot_uri: skos:hiddenLabel
    range: LangString
    multivalued: true
    description: Skjult term for kodeelementet (skos:hiddenLabel).

  inklusjonsmerknad:
    slot_uri: xkos:inclusionNote
    range: LangString
    multivalued: true
    description: Notat om kva som er inkludert i kodeelementet (xkos:inclusionNote).

  merknad:
    slot_uri: skos:note
    range: LangString
    multivalued: true
    description: Generelt notat om kodeelementet (skos:note).

  neste_kodeelement:
    slot_uri: xkos:next
    range: Kodeelement
    description: Neste kodeelement i en ordnet kodeliste (xkos:next).

  omfangsmerknad:
    slot_uri: skos:scopeNote
    range: LangString
    multivalued: true
    description: Notat om omfanget til kodeelementet (skos:scopeNote).

  tillatt_kodetekst:
    slot_uri: skos:altLabel
    range: LangString
    multivalued: true
    description: Alternativ term for kodeelementet (skos:altLabel).

  # ---- Merknad / Betingelsesregel ------------------------------------------

  annoterer:
    slot_uri: modelldcatno:annotates
    range: Modellelement
    multivalued: true
    description: Modellelement denne merknaden gjeld (modelldcatno:annotates).

  egenskapsmerknad:
    slot_uri: modelldcatno:propertyNote
    range: LangString
    multivalued: true
    description: Fritekstmerknad om ein eigenskap (modelldcatno:propertyNote).

  begrenser:
    slot_uri: modelldcatno:constrains
    range: Modellelement
    multivalued: true
    description: Modellelement betingelsesregelen avgrensar (modelldcatno:constrains).

  begrensningsuttrykk:
    slot_uri: modelldcatno:constraintExpression
    range: LangString
    multivalued: true
    description: Formelt uttrykk for betingelsesregelen (modelldcatno:constraintExpression).
