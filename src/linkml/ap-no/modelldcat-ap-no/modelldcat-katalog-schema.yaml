id: https://data.norge.no/ap-no/modelldcat-ap-no/katalog
name: modelldcat-katalog
title: ModelDCAT-AP-NO – Katalogdel
description: >-
  Katalogklasser frå ModelDCAT-AP-NO: Modellkatalog, Informasjonsmodell og
  modelldcat-spesifikke hjelpeklassar (Lisensdokument, Dokument).
  Klassar som er felles med DCAT-AP-NO (Aktoer, Kontaktopplysning, Standard,
  Tidsrom, KatalogisertRessurs) er arvde via import av dcat-ap-no-schema.
  Basert på https://data.norge.no/specification/modelldcat-ap-no#Egenskaper-katalogdel

version: "1.0.0"
license: https://data.norge.no/nlod/no/2.0

prefixes:
  linkml:        https://w3id.org/linkml/
  modelldcatno:  https://data.norge.no/vocabulary/modelldcatno#
  dcat:          http://www.w3.org/ns/dcat#
  dct:           http://purl.org/dc/terms/
  foaf:          http://xmlns.com/foaf/0.1/
  prof:          http://www.w3.org/ns/dx/prof/

default_prefix: https://data.norge.no/ap-no/modelldcat-ap-no/katalog/
default_range: string

imports:
  - linkml:types
  - ../common/common-ap-no-schema
  - ./modelldcat-modell-schema
  - ../dcat-ap-no/dcat-ap-no-schema

# ---------------------------------------------------------------------------
# Klasser — Katalogdel
# ---------------------------------------------------------------------------

classes:

  # ---- Modelldcat-spesifikke hjelpeklassar ---------------------------------
  # Aktoer, Kontaktopplysning, Standard, Tidsrom og KatalogisertRessurs
  # er arvde frå dcat-ap-no-schema (importert ovanfor).

  Lisensdokument:
    in_subset:
      - Metadata
    class_uri: dct:LicenseDocument
    description: Eit lisensdokument (dct:LicenseDocument).
    slots:
      - id
      - type_concept

  Dokument:
    in_subset:
      - Metadata
    class_uri: foaf:Document
    description: Eit dokument (foaf:Document).
    slots:
      - id
      - tittel
      - spraak
      - format

  # ---- Modellkatalog --------------------------------------------------------

  Modellkatalog:
    in_subset:
      - Metadata
    class_uri: dcat:Catalog
    description: >-
      Ei kuratert samling av metadata om informasjonsmodellar (dcat:Catalog).
    slots:
      - id
      - tittel
      - beskrivelse
      - har_del
      - identifikator_literal
      - kontaktpunkt
      - utgiver
      - endringsdato
      - heimeside
      - lisens
      - modell
      - spraak
      - tema
      - temaer
      - utgivelsesdato
      - er_del_av
    slot_usage:
      tittel:
        in_subset:
          - Obligatorisk
      beskrivelse:
        in_subset:
          - Obligatorisk
      har_del:
        in_subset:
          - Anbefalt
      identifikator_literal:
        required: true
        in_subset:
          - Obligatorisk
      kontaktpunkt:
        required: true
        in_subset:
          - Obligatorisk
      utgiver:
        required: true
        in_subset:
          - Obligatorisk
      endringsdato:
        in_subset:
          - Anbefalt
      heimeside:
        in_subset:
          - Anbefalt
      lisens:
        in_subset:
          - Anbefalt
      modell:
        in_subset:
          - Anbefalt
      spraak:
        in_subset:
          - Anbefalt
      tema:
        in_subset:
          - Anbefalt
      utgivelsesdato:
        in_subset:
          - Anbefalt
      temaer:
        in_subset:
          - Valgfri
      er_del_av:
        range: Modellkatalog
        in_subset:
          - Valgfri

  # ---- Informasjonsmodell --------------------------------------------------

  Informasjonsmodell:
    in_subset:
      - Metadata
    class_uri: modelldcatno:InformationModel
    description: >-
      Ein informasjonsmodell som er katalogisert i ein modellkatalog
      (modelldcatno:InformationModel).
    slots:
      - id
      - tittel
      - utgiver
      - begrep
      - beskrivelse
      - identifikator_literal
      - informasjonsmodellidentifikator
      - inneholder_modellelement
      - kontaktpunkt
      - lisens
      - tema
      - dekningsomraade
      - endringsdato
      - er_del_av
      - er_profil_av
      - er_erstattet_av
      - erstatter
      - har_del
      - finnes_i_format
      - gyldighetsperiode
      - heimeside
      - er_i_samsvar_med
      - status
      - nokkelord
      - produsent
      - spraak
      - type_concept
      - utgivelsesdato
      - versjonsnummer
      - versjonsmerknad
    slot_usage:
      tittel:
        in_subset:
          - Obligatorisk
      utgiver:
        required: true
        in_subset:
          - Obligatorisk
      begrep:
        in_subset:
          - Anbefalt
      beskrivelse:
        in_subset:
          - Anbefalt
      identifikator_literal:
        in_subset:
          - Anbefalt
      informasjonsmodellidentifikator:
        in_subset:
          - Anbefalt
      inneholder_modellelement:
        in_subset:
          - Anbefalt
      kontaktpunkt:
        in_subset:
          - Anbefalt
      lisens:
        in_subset:
          - Anbefalt
      tema:
        in_subset:
          - Anbefalt
      dekningsomraade:
        in_subset:
          - Valgfri
      endringsdato:
        in_subset:
          - Valgfri
      er_del_av:
        range: Informasjonsmodell
        in_subset:
          - Valgfri
      er_profil_av:
        in_subset:
          - Valgfri
      er_erstattet_av:
        in_subset:
          - Valgfri
      erstatter:
        in_subset:
          - Valgfri
      har_del:
        range: Informasjonsmodell
        in_subset:
          - Valgfri
      finnes_i_format:
        in_subset:
          - Valgfri
      gyldighetsperiode:
        in_subset:
          - Valgfri
      heimeside:
        in_subset:
          - Valgfri
      er_i_samsvar_med:
        in_subset:
          - Valgfri
      status:
        in_subset:
          - Valgfri
      nokkelord:
        in_subset:
          - Valgfri
      produsent:
        in_subset:
          - Valgfri
      spraak:
        in_subset:
          - Valgfri
      type_concept:
        in_subset:
          - Valgfri
        annotations:
          gyldige_verdier: >-
            https://data.norge.no/vocabulary/modelldcatno#LogicalDataModel
            https://data.norge.no/vocabulary/modelldcatno#ConceptualDataModel
            https://data.norge.no/vocabulary/modelldcatno#PhysicalDataModel
      utgivelsesdato:
        in_subset:
          - Valgfri
      versjonsnummer:
        in_subset:
          - Valgfri
      versjonsmerknad:
        in_subset:
          - Valgfri

# ---------------------------------------------------------------------------
# Slots — Katalogdel (modelldcat-spesifikke eller med avvikande range)
# ---------------------------------------------------------------------------

slots:

  # lisens: range er Lisensdokument (ikkje string som i dcat-ap-no)
  lisens:
    slot_uri: dct:license
    range: Lisensdokument
    description: Lisens for bruk av ressursen (dct:license).

  # tema: range er Konsept (ikkje uriorcurie som i dcat-ap-no)
  tema:
    slot_uri: dcat:theme
    range: Konsept
    multivalued: true
    description: Tema frå eit kontrollert vokabular (dcat:theme).

  # har_del: range er KatalogisertRessurs (ikkje Katalog som i dcat-ap-no)
  har_del:
    slot_uri: dct:hasPart
    range: KatalogisertRessurs
    multivalued: true
    description: Del-ressurs inkludert i denne ressursen (dct:hasPart).

  modell:
    slot_uri: modelldcatno:model
    range: Informasjonsmodell
    multivalued: true
    description: Informasjonsmodellar i modellkatalogen (modelldcatno:model).

  er_del_av:
    slot_uri: dct:isPartOf
    range: KatalogisertRessurs
    description: Overordna ressurs denne er ein del av (dct:isPartOf).

  er_profil_av:
    slot_uri: prof:isProfileOf
    range: Standard
    multivalued: true
    description: Standard denne informasjonsmodellen er ein profil av (prof:isProfileOf).

  er_erstattet_av:
    slot_uri: dct:isReplacedBy
    range: Informasjonsmodell
    multivalued: true
    description: Informasjonsmodell som erstattar denne (dct:isReplacedBy).

  # erstatter: range er Informasjonsmodell (ikkje Datasett som i dcat-ap-no)
  erstatter:
    slot_uri: dct:replaces
    range: Informasjonsmodell
    multivalued: true
    description: Informasjonsmodell som denne erstattar (dct:replaces).

  finnes_i_format:
    slot_uri: dct:hasFormat
    range: Dokument
    multivalued: true
    description: Dokument som representerer ein annan form av modellen (dct:hasFormat).

  gyldighetsperiode:
    slot_uri: dct:temporal
    range: Tidsrom
    multivalued: true
    description: Gyldighetsperioden ressursen gjelder for (dct:temporal).

  er_i_samsvar_med:
    slot_uri: dct:conformsTo
    range: Standard
    multivalued: true
    description: Standard ressursen er i samsvar med (dct:conformsTo).

  informasjonsmodellidentifikator:
    slot_uri: modelldcatno:informationModelIdentifier
    range: string
    description: Identifikator for informasjonsmodellen i domenet (modelldcatno:informationModelIdentifier).

  inneholder_modellelement:
    slot_uri: modelldcatno:containsModelElement
    range: Modellelement
    multivalued: true
    description: Modellelement som er del av informasjonsmodellen (modelldcatno:containsModelElement).
