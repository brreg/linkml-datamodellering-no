id: https://data.norge.no/ap-no/modelldcat-ap-no
name: modelldcat-ap-no
title: ModelDCAT-AP-NO
description: >-
  Norsk applikasjonsprofil for beskriving av informasjonsmodellar i DCAT-format,
  modellert i LinkML. Basert på https://data.norge.no/specification/modelldcat-ap-no

version: "1.0.0"
license: https://data.norge.no/nlod/no/2.0

annotations:
  utgiver: https://data.norge.no/organizations/991825827
  endringsdato: "2026-06-10"
  utgivelsesdato: "2023-01-01"
  status: http://purl.org/adms/status/Completed

prefixes:
  linkml:        https://w3id.org/linkml/
  modelldcatno:  https://data.norge.no/vocabulary/modelldcatno#
  dcat:          http://www.w3.org/ns/dcat#
  dct:           http://purl.org/dc/terms/
  foaf:          http://xmlns.com/foaf/0.1/
  skos:          http://www.w3.org/2004/02/skos/core#
  vcard:         http://www.w3.org/2006/vcard/ns#
  xsd:           http://www.w3.org/2001/XMLSchema#
  rdfs:          http://www.w3.org/2000/01/rdf-schema#
  owl:           http://www.w3.org/2002/07/owl#
  adms:          http://www.w3.org/ns/adms#
  prof:          http://www.w3.org/ns/dx/prof/
  xkos:          http://rdf-vocabulary.ddialliance.org/xkos#

default_prefix: https://data.norge.no/ap-no/modelldcat-ap-no/
default_range: string

imports:
  - linkml:types
  - ../common/common-ap-no-schema

# ---------------------------------------------------------------------------
# Klasser
# ---------------------------------------------------------------------------

classes:

  # ---- Hjelpeklassar for refererte vokabularressursar ----------------------

  KatalogisertRessurs:
    in_subset:
      - Metadata
    class_uri: dcat:Resource
    description: Basisklasse for ressursar som kan katalogiserast (dcat:Resource).
    slots:
      - id

  Aktoer:
    in_subset:
      - Metadata
    class_uri: foaf:Agent
    description: Ein aktør (person, organisasjon eller system) med ansvar for ein ressurs.
    slots:
      - id
      - navn_aktoer
      - identifikator_literal
      - type_concept
    slot_usage:
      navn_aktoer:
        in_subset:
          - Obligatorisk

  Kontaktopplysning:
    in_subset:
      - Metadata
    class_uri: vcard:Organization
    description: Kontaktinformasjon (vcard:Organization).
    slots:
      - id

  Standard:
    in_subset:
      - Metadata
    class_uri: dct:Standard
    description: Ein standard (dct:Standard).
    slots:
      - id
      - tittel
      - har_referanse
      - versjonsnummer
    slot_usage:
      tittel:
        in_subset:
          - Obligatorisk

  Lisensdokument:
    in_subset:
      - Metadata
    class_uri: dct:LicenseDocument
    description: Eit lisensdokument (dct:LicenseDocument).
    slots:
      - id
      - type_concept

  Lokasjon:
    in_subset:
      - Metadata
    class_uri: dct:Location
    description: Eit geografisk område (dct:Location).
    slots:
      - id

  Tidsperiode:
    in_subset:
      - Metadata
    class_uri: dct:PeriodOfTime
    description: Eit tidsintervall med start- og sluttdato.
    slots:
      - id
      - startdato
      - sluttdato

  Dokument:
    in_subset:
      - Metadata
    class_uri: foaf:Document
    description: Eit dokument (foaf:Document).
    slots:
      - id
      - tittel
      - spraak
      - format

  # ---- Modellkatalog --------------------------------------------------------

  Modellkatalog:
    in_subset:
      - Metadata
    class_uri: dcat:Catalog
    description: >-
      Ei kuratert samling av metadata om informasjonsmodellar (dcat:Catalog).
    slots:
      - id
      - tittel
      - beskrivelse
      - har_del
      - identifikator_literal
      - kontaktpunkt
      - utgiver
      - endringsdato
      - heimeside
      - lisens
      - modell
      - spraak
      - tema
      - temaer
      - utgivelsesdato
      - er_del_av
    slot_usage:
      tittel:
        in_subset:
          - Obligatorisk
      beskrivelse:
        in_subset:
          - Obligatorisk
      har_del:
        required: true
        in_subset:
          - Obligatorisk
      identifikator_literal:
        required: true
        in_subset:
          - Obligatorisk
      kontaktpunkt:
        required: true
        in_subset:
          - Obligatorisk
      utgiver:
        required: true
        in_subset:
          - Obligatorisk
      endringsdato:
        in_subset:
          - Anbefalt
      heimeside:
        in_subset:
          - Anbefalt
      lisens:
        in_subset:
          - Anbefalt
      modell:
        in_subset:
          - Anbefalt
      spraak:
        in_subset:
          - Anbefalt
      tema:
        in_subset:
          - Anbefalt
      utgivelsesdato:
        in_subset:
          - Anbefalt
      temaer:
        in_subset:
          - Valgfri
      er_del_av:
        range: Modellkatalog
        in_subset:
          - Valgfri

  # ---- Informasjonsmodell --------------------------------------------------

  Informasjonsmodell:
    in_subset:
      - Metadata
    class_uri: modelldcatno:InformationModel
    description: >-
      Ein informasjonsmodell som er katalogisert i ein modellkatalog
      (modelldcatno:InformationModel).
    slots:
      - id
      - tittel
      - utgiver
      - begrep
      - beskrivelse
      - identifikator_literal
      - informasjonsmodellidentifikator
      - inneholder_modellelement
      - kontaktpunkt
      - lisens
      - tema
      - dekningsomraade
      - endringsdato
      - er_del_av
      - er_profil_av
      - er_erstattet_av
      - erstatter
      - har_del
      - finnes_i_format
      - gyldighetsperiode
      - heimeside
      - er_i_samsvar_med
      - status
      - nokkelord
      - produsent
      - spraak
      - type_concept
      - utgivelsesdato
      - versjonsnummer
      - versjonsmerknad
    slot_usage:
      tittel:
        in_subset:
          - Obligatorisk
      utgiver:
        required: true
        in_subset:
          - Obligatorisk
      begrep:
        in_subset:
          - Anbefalt
      beskrivelse:
        in_subset:
          - Anbefalt
      identifikator_literal:
        in_subset:
          - Anbefalt
      informasjonsmodellidentifikator:
        in_subset:
          - Anbefalt
      inneholder_modellelement:
        in_subset:
          - Anbefalt
      kontaktpunkt:
        in_subset:
          - Anbefalt
      lisens:
        in_subset:
          - Anbefalt
      tema:
        in_subset:
          - Anbefalt
      dekningsomraade:
        in_subset:
          - Valgfri
      endringsdato:
        in_subset:
          - Valgfri
      er_del_av:
        range: Informasjonsmodell
        in_subset:
          - Valgfri
      er_profil_av:
        in_subset:
          - Valgfri
      er_erstattet_av:
        in_subset:
          - Valgfri
      erstatter:
        in_subset:
          - Valgfri
      har_del:
        range: Informasjonsmodell
        in_subset:
          - Valgfri
      finnes_i_format:
        in_subset:
          - Valgfri
      gyldighetsperiode:
        in_subset:
          - Valgfri
      heimeside:
        in_subset:
          - Valgfri
      er_i_samsvar_med:
        in_subset:
          - Valgfri
      status:
        in_subset:
          - Valgfri
      nokkelord:
        in_subset:
          - Valgfri
      produsent:
        in_subset:
          - Valgfri
      spraak:
        in_subset:
          - Valgfri
      type_concept:
        in_subset:
          - Valgfri
      utgivelsesdato:
        in_subset:
          - Valgfri
      versjonsnummer:
        in_subset:
          - Valgfri
      versjonsmerknad:
        in_subset:
          - Valgfri

  # ---- Modellelement (abstrakt) --------------------------------------------

  Modellelement:
    in_subset:
      - Metadata
    abstract: true
    class_uri: modelldcatno:ModelElement
    description: Abstrakt basisklasse for alle modellelement i ein informasjonsmodell.
    slots:
      - id
      - tittel
      - begrep
      - identifikator_literal
      - har_egenskap
      - beskrivelse
      - tilhoerer_modul
    slot_usage:
      tittel:
        in_subset:
          - Obligatorisk
      begrep:
        in_subset:
          - Anbefalt
      identifikator_literal:
        in_subset:
          - Anbefalt
      har_egenskap:
        in_subset:
          - Anbefalt
      beskrivelse:
        in_subset:
          - Valgfri
      tilhoerer_modul:
        in_subset:
          - Valgfri

  # ---- Subklassar av Modellelement -----------------------------------------

  Objekttype:
    in_subset:
      - Metadata
    is_a: Modellelement
    class_uri: modelldcatno:ObjectType
    description: Ein objekttype — ein klasse med eigenskapar i informasjonsmodellen.

  Rotobjekttype:
    in_subset:
      - Metadata
    is_a: Modellelement
    class_uri: modelldcatno:RootObjectType
    description: Ein rotobjekttype — toppnivå-klasse i informasjonsmodellen.

  Datatype:
    in_subset:
      - Metadata
    is_a: Modellelement
    class_uri: modelldcatno:DataType
    description: Ein datatype — ein strukturert samansett type.

  Enkeltype:
    in_subset:
      - Metadata
    is_a: Modellelement
    class_uri: modelldcatno:SimpleType
    description: Ein enkel type med restriksjonar (xsd-fasettar).
    slots:
      - typedefinisjon
      - antall_desimaler
      - lengde
      - maksimum_ikke_inklusivt
      - maksimum_inklusivt
      - maks_lengde
      - minimum_ikke_inklusivt
      - minimum_inklusivt
      - minimum_lengde
      - moenster
      - totalt_antall_siffer
    slot_usage:
      typedefinisjon:
        in_subset:
          - Anbefalt

  Kodeliste:
    in_subset:
      - Metadata
    is_a: Modellelement
    class_uri: modelldcatno:CodeList
    description: Ei kodeliste — eit kontrollert vokabular av tillate verdiar.
    slots:
      - har_referanse

  Modul:
    in_subset:
      - Metadata
    is_a: Modellelement
    class_uri: modelldcatno:Module
    description: Ein modul som grupperer modellelement i informasjonsmodellen.

  # ---- Eigenskap (abstrakt) ------------------------------------------------

  Egenskap:
    in_subset:
      - Metadata
    abstract: true
    class_uri: modelldcatno:Property
    description: Abstrakt basisklasse for eigenskapar knytt til eit modellelement.
    slots:
      - id
      - begrep
      - identifikator_literal
      - navigerbar
      - nedre_multiplisitet
      - tittel
      - oevre_multiplisitet
      - beskrivelse
      - har_type
      - relasjonsegenskapsnavn
      - sekvensnummer
      - tilhoerer_modul
      - utgjor_symmetrisk_relasjon_med
    slot_usage:
      begrep:
        in_subset:
          - Anbefalt
      identifikator_literal:
        in_subset:
          - Anbefalt
      navigerbar:
        in_subset:
          - Anbefalt
      nedre_multiplisitet:
        in_subset:
          - Anbefalt
      tittel:
        in_subset:
          - Anbefalt
      oevre_multiplisitet:
        in_subset:
          - Anbefalt
      beskrivelse:
        in_subset:
          - Valgfri
      har_type:
        in_subset:
          - Valgfri
      relasjonsegenskapsnavn:
        in_subset:
          - Valgfri
      sekvensnummer:
        in_subset:
          - Valgfri
      tilhoerer_modul:
        in_subset:
          - Valgfri
      utgjor_symmetrisk_relasjon_med:
        in_subset:
          - Valgfri

  # ---- Subklassar av Eigenskap ---------------------------------------------

  Attributt:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Attribute
    description: Ein attributt — ein eigenskap med ein datatype eller enkel type som verdi.
    slots:
      - har_datatype
      - har_enkel_type
      - har_verdi_fra
      - inneholder_objekttype
    slot_usage:
      har_datatype:
        in_subset:
          - Anbefalt
      har_enkel_type:
        in_subset:
          - Anbefalt
      har_verdi_fra:
        in_subset:
          - Anbefalt
      inneholder_objekttype:
        in_subset:
          - Anbefalt

  Assosiasjon:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Association
    description: Ein assosiasjon — ein eigenskap som refererer til eit anna modellelement.
    slots:
      - refererer_til
    slot_usage:
      refererer_til:
        in_subset:
          - Anbefalt

  Rolle:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Role
    description: Ein rolle — ein eigenskap som knyter ein objekttype til ein assosiasjon.
    slots:
      - har_objekttype
    slot_usage:
      har_objekttype:
        in_subset:
          - Anbefalt

  Spesialisering:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Specialization
    description: Ein spesialisering — eit arveforhold frå eit spesielt til eit generelt modellelement.
    slots:
      - har_generelt_begrep
    slot_usage:
      har_generelt_begrep:
        in_subset:
          - Anbefalt

  Komposisjon:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Composition
    description: Ein sammensetning — ein sterk eigarelskapsrelasjon mellom modellelement.
    slots:
      - inneholder
    slot_usage:
      inneholder:
        in_subset:
          - Anbefalt

  Realisering:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Realization
    description: Ein realisering — ein implementasjonsrelasjon mellom modellelement.
    slots:
      - har_leverandoer
    slot_usage:
      har_leverandoer:
        in_subset:
          - Anbefalt

  Abstraksjon:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Abstraction
    description: Ein abstraksjon — ein forenkling som representerer eit modellelement.
    slots:
      - er_abstraksjon_av
    slot_usage:
      er_abstraksjon_av:
        in_subset:
          - Anbefalt

  Avhengighet:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Dependency
    description: Ein avhengighet — ein relasjon der det eine modellelementet avheng av det andre.
    slots:
      - avhengig_av
    slot_usage:
      avhengig_av:
        in_subset:
          - Anbefalt

  Samling:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Collection
    description: Ein samling — ein eigenskap som representerer ei uordna mengd av modellelement.

  Valg:
    in_subset:
      - Metadata
    is_a: Egenskap
    class_uri: modelldcatno:Choice
    description: Eit val — ein eigenskap som representerer eit val mellom modellelement.
    slots:
      - har_noe
    slot_usage:
      har_noe:
        in_subset:
          - Anbefalt

  Alle:
    in_subset:
      - Metadata
    is_a: Valg
    class_uri: modelldcatno:AllOf
    description: Alle av — alle modellelementa i lista må gjelde (logisk OG-mengd).

  NoenAv:
    in_subset:
      - Metadata
    is_a: Valg
    class_uri: modelldcatno:AnyOf
    description: Nokon av — minst eitt modellelement i lista må gjelde (logisk ELLER-mengd).

  # ---- Merknad og betingelsesreglar ----------------------------------------

  Note:
    in_subset:
      - Metadata
    class_uri: modelldcatno:Note
    description: Ei merknad knytt til eit modellelement eller eigenskap.
    slots:
      - id
      - annoterer
      - egenskapsmerknad
      - identifikator_literal
      - tittel
      - tilhoerer_modul
    slot_usage:
      annoterer:
        in_subset:
          - Anbefalt
      egenskapsmerknad:
        in_subset:
          - Anbefalt
      identifikator_literal:
        in_subset:
          - Anbefalt
      tittel:
        in_subset:
          - Anbefalt
      tilhoerer_modul:
        in_subset:
          - Valgfri

  Begrensningsregel:
    in_subset:
      - Metadata
    is_a: Note
    class_uri: modelldcatno:ConstraintRule
    description: Ein betingelsesregel — ei formell avgrensing på modellelement eller eigenskapar.
    slots:
      - begrenser
      - begrensningsuttrykk
    slot_usage:
      begrenser:
        required: true
        in_subset:
          - Obligatorisk
      begrensningsuttrykk:
        in_subset:
          - Anbefalt

  Og:
    in_subset:
      - Metadata
    is_a: Begrensningsregel
    class_uri: modelldcatno:And
    description: Og — logisk OG-betingelse; alle deltakande modellelement må gjelde.

  Eller:
    in_subset:
      - Metadata
    is_a: Begrensningsregel
    class_uri: modelldcatno:Or
    description: Eller — logisk ELLER-betingelse; minst eitt modellelement må gjelde.

  EntenEller:
    in_subset:
      - Metadata
    is_a: Begrensningsregel
    class_uri: modelldcatno:Xor
    description: Xor — eksklusiv ELLER-betingelse; nøyaktig eitt modellelement må gjelde.

  Ikke:
    in_subset:
      - Metadata
    is_a: Begrensningsregel
    class_uri: modelldcatno:Not
    description: Ikkje — negasjon; modellelementet det refererer til må ikkje gjelde.

  # ---- Kodeelement ---------------------------------------------------------

  Kodeelement:
    in_subset:
      - Metadata
    class_uri: modelldcatno:CodeElement
    description: Eit element i ei kodeliste (modelldcatno:CodeElement).
    slots:
      - id
      - i_kodeliste
      - kode
      - anbefalt_kodetekst
      - begrep
      - identifikator_literal
      - toppelement_til
      - definisjon
      - eksempel
      - eksklusjonsmerknad
      - forrige_kodeelement
      - fraradet_kodetekst
      - inklusjonsmerknad
      - merknad
      - neste_kodeelement
      - omfangsmerknad
      - tillatt_kodetekst
    slot_usage:
      i_kodeliste:
        required: true
        in_subset:
          - Obligatorisk
      kode:
        required: true
        in_subset:
          - Obligatorisk
      anbefalt_kodetekst:
        in_subset:
          - Anbefalt
      begrep:
        in_subset:
          - Anbefalt
      identifikator_literal:
        in_subset:
          - Anbefalt
      toppelement_til:
        in_subset:
          - Anbefalt

# ---------------------------------------------------------------------------
# Slots
# ---------------------------------------------------------------------------

slots:

  # ---- Aktor ---------------------------------------------------------------

  navn_aktoer:
    slot_uri: foaf:name
    range: LangString
    multivalued: true
    description: Navn på aktøren (foaf:name).

  # ---- Tidsperiode ---------------------------------------------------------

  startdato:
    slot_uri: dcat:startDate
    range: date
    description: Startdato for tidsperioden (dcat:startDate).

  sluttdato:
    slot_uri: dcat:endDate
    range: date
    description: Sluttdato for tidsperioden (dcat:endDate).

  # ---- Modellkatalog og Informasjonsmodell ----------------------------------

  utgiver:
    slot_uri: dct:publisher
    range: Aktoer
    description: Aktøren ansvarleg for å tilgjengeleggjere ressursen (dct:publisher).

  produsent:
    slot_uri: dct:creator
    range: Aktoer
    description: Aktøren som primært har skapt ressursen (dct:creator).

  kontaktpunkt:
    slot_uri: dcat:contactPoint
    range: Kontaktopplysning
    multivalued: true
    description: Kontaktinformasjon for ressursen (dcat:contactPoint).

  lisens:
    slot_uri: dct:license
    range: Lisensdokument
    description: Lisens for bruk av ressursen (dct:license).

  tema:
    slot_uri: dcat:theme
    range: Konsept
    multivalued: true
    description: Tema frå eit kontrollert vokabular (dcat:theme).

  temaer:
    slot_uri: dcat:themeTaxonomy
    range: Begrepssamling
    multivalued: true
    description: Temavokabular brukt i katalogen (dcat:themeTaxonomy).

  begrep:
    slot_uri: dct:subject
    range: Konsept
    multivalued: true
    description: Fagomgrep ressursen handlar om (dct:subject).

  har_del:
    slot_uri: dct:hasPart
    range: KatalogisertRessurs
    multivalued: true
    description: Del-ressurs inkludert i denne ressursen (dct:hasPart).

  modell:
    slot_uri: modelldcatno:model
    range: Informasjonsmodell
    multivalued: true
    description: Informasjonsmodellar i modellkatalogen (modelldcatno:model).

  er_del_av:
    slot_uri: dct:isPartOf
    range: KatalogisertRessurs
    description: Overordna ressurs denne er ein del av (dct:isPartOf).

  er_profil_av:
    slot_uri: prof:isProfileOf
    range: Standard
    multivalued: true
    description: Standard denne informasjonsmodellen er ein profil av (prof:isProfileOf).

  er_erstattet_av:
    slot_uri: dct:isReplacedBy
    range: Informasjonsmodell
    multivalued: true
    description: Informasjonsmodell som erstattar denne (dct:isReplacedBy).

  erstatter:
    slot_uri: dct:replaces
    range: Informasjonsmodell
    multivalued: true
    description: Informasjonsmodell som denne erstattar (dct:replaces).

  finnes_i_format:
    slot_uri: dct:hasFormat
    range: Dokument
    multivalued: true
    description: Dokument som representerer ein annan form av modellen (dct:hasFormat).

  gyldighetsperiode:
    slot_uri: dct:temporal
    range: Tidsperiode
    multivalued: true
    description: Gyldighetsperioden ressursen gjelder for (dct:temporal).

  er_i_samsvar_med:
    slot_uri: dct:conformsTo
    range: Standard
    multivalued: true
    description: Standard ressursen er i samsvar med (dct:conformsTo).

  informasjonsmodellidentifikator:
    slot_uri: modelldcatno:informationModelIdentifier
    range: string
    description: Identifikator for informasjonsmodellen i domenet (modelldcatno:informationModelIdentifier).

  # ---- Modellelement -------------------------------------------------------

  inneholder_modellelement:
    slot_uri: modelldcatno:containsModelElement
    range: Modellelement
    multivalued: true
