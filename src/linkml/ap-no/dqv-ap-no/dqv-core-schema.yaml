id: https://data.norge.no/ap-no/dqv-core
name: dqv-core
title: DQV-AP-NO – Kjerneklassar (utan DCAT-avhengigheit)
description: >-
  DQV-kjerneklassar og -slots utan referanse til dcat-ap-no.
  Denne fila vert importert av dcat-ap-no for å gje tilgang til Kvalitetsmerknad
  og Kvalitetsmaaling på Datasett, utan å skape sirkulær import.
  dqv-ap-no importerer dcat-ap-no og narrowar har_maal.range via slot_usage.

version: "1.0.0"
license: https://data.norge.no/nlod/no/2.0

annotations:
  status: http://purl.org/adms/status/Completed

prefixes:
  linkml:  https://w3id.org/linkml/
  dqv:     http://www.w3.org/ns/dqv#
  dqvno:   https://data.norge.no/vocabulary/dqvno#
  oa:      http://www.w3.org/ns/oa#
  skos:    http://www.w3.org/2004/02/skos/core#
  rdfs:    http://www.w3.org/2000/01/rdf-schema#

default_prefix: https://data.norge.no/ap-no/dqv-core/
default_range: string

imports:
  - linkml:types
  - ../common/common-ap-no-schema

# ---------------------------------------------------------------------------
# Klasser
# ---------------------------------------------------------------------------

classes:

  Kvalitetsdimensjon:
    in_subset:
      - Metadata
    class_uri: dqv:Dimension
    description: Ein kvalitetsdimensjon som grupperer relaterte kvalitetsmål.
    slots:
      - id
      - har_anbefalt_term
      - har_definisjon
      - gjelder_standard
    slot_usage:
      har_anbefalt_term:
        in_subset:
          - Anbefalt
      har_definisjon:
        in_subset:
          - Anbefalt
      gjelder_standard:
        in_subset:
          - Anbefalt

  Kvalitetsdeldimensjon:
    in_subset:
      - Metadata
    is_a: Kvalitetsdimensjon
    class_uri: dqvno:SubDimension
    description: Ein deldimensjon av ein kvalitetsdimensjon.
    slots:
      - er_deldimensjon_av
    slot_usage:
      er_deldimensjon_av:
        required: true
        in_subset:
          - Obligatorisk
      har_anbefalt_term:
        in_subset:
          - Anbefalt
      har_definisjon:
        in_subset:
          - Anbefalt

  Kvalitetsmaal:
    in_subset:
      - Metadata
    class_uri: dqv:Metric
    description: Eit kvalitetsmål som operasjonaliserer ein kvalitetsdeldimensjon.
    slots:
      - id
      - er_i_kvalitetsdeldimensjon
      - har_forventet_datatype
      - har_anbefalt_term
      - har_definisjon
    slot_usage:
      er_i_kvalitetsdeldimensjon:
        required: true
        in_subset:
          - Obligatorisk
      har_forventet_datatype:
        in_subset:
          - Anbefalt
      har_anbefalt_term:
        in_subset:
          - Anbefalt
      har_definisjon:
        in_subset:
          - Anbefalt

  Kvalitetsmerknad:
    in_subset:
      - Metadata
    class_uri: dqv:QualityAnnotation
    description: Ein merknad om kvaliteten til eit datasett.
    slots:
      - id
      - er_motivert_av
      - er_i_kvalitetsdimensjon
      - har_tekstdel
      - har_merknad
      - har_maal
    slot_usage:
      er_motivert_av:
        required: true
        in_subset:
          - Obligatorisk
      er_i_kvalitetsdimensjon:
        in_subset:
          - Anbefalt
      har_tekstdel:
        in_subset:
          - Anbefalt
      har_merknad:
        in_subset:
          - Valgfri
      har_maal:
        in_subset:
          - Valgfri

  Brukartilbakemelding:
    in_subset:
      - Metadata
    is_a: Kvalitetsmerknad
    class_uri: dqv:UserQualityFeedback
    description: Tilbakemelding frå ein brukar om kvaliteten til eit datasett.

  Kvalitetssertifikat:
    in_subset:
      - Metadata
    is_a: Kvalitetsmerknad
    class_uri: dqv:QualityCertificate
    description: Eit sertifikat som stadfester kvaliteten til eit datasett.

  Kvalitetsmaaling:
    in_subset:
      - Metadata
    class_uri: dqv:QualityMeasurement
    description: Ei konkret måling av eit kvalitetsmål for eit datasett.
    slots:
      - id
      - er_kvalitetsmaaling_av
      - har_boolean_verdi
      - har_numerisk_verdi
      - har_tekst_verdi
      - har_merknad
    slot_usage:
      er_kvalitetsmaaling_av:
        required: true
        in_subset:
          - Obligatorisk
      har_boolean_verdi:
        in_subset:
          - Anbefalt
      har_numerisk_verdi:
        in_subset:
          - Anbefalt
      har_tekst_verdi:
        in_subset:
          - Anbefalt
      har_merknad:
        in_subset:
          - Valgfri

  Tekstdel:
    in_subset:
      - Metadata
    class_uri: oa:TextualBody
    description: Ein tekstleg del av ein kvalitetsmerknad (Web Annotation).
    slots:
      - id
      - har_verdi_tekstdel
      - format
      - spraak
    slot_usage:
      har_verdi_tekstdel:
        required: true
        in_subset:
          - Obligatorisk
      format:
        in_subset:
          - Anbefalt
      spraak:
        in_subset:
          - Anbefalt

# ---------------------------------------------------------------------------
# Slots
# ---------------------------------------------------------------------------

slots:

  har_kvalitetsmerknad:
    slot_uri: dqv:hasQualityAnnotation
    range: Kvalitetsmerknad
    multivalued: true
    description: Kvalitetsmerknad knytt til datasettet.

  har_kvalitetsmaaling:
    slot_uri: dqv:hasQualityMeasurement
    range: Kvalitetsmaaling
    multivalued: true
    description: Kvalitetsmåling knytt til datasettet.

  er_deldimensjon_av:
    slot_uri: skos:broader
    range: Kvalitetsdimensjon
    description: Overordna kvalitetsdimensjon denne deldimensjonen høyrer til.

  har_anbefalt_term:
    slot_uri: skos:prefLabel
    range: LangString
    multivalued: true
    description: Føretrekt term/namn for dimensjonen eller målet.

  har_definisjon:
    slot_uri: skos:definition
    range: LangString
    multivalued: true
    description: Definisjon av dimensjonen eller målet.

  er_i_kvalitetsdeldimensjon:
    slot_uri: dqvno:inSubDimension
    range: Kvalitetsdeldimensjon
    description: Kvalitetsdeldimensjonen dette målet operasjonaliserer.

  har_forventet_datatype:
    slot_uri: dqv:expectedDataType
    range: uriorcurie
    description: Forventa XSD-datatype for verdien av ei kvalitetsmåling.

  er_motivert_av:
    slot_uri: oa:motivatedBy
    range: DqvMotivasjon
    description: Motivasjonen bak kvalitetsmerknaden.

  er_i_kvalitetsdimensjon:
    slot_uri: dqv:inDimension
    range: Kvalitetsdimensjon
    multivalued: true
    required: false
    description: Refererer til kvalitetsdimensjon(ar) som kvalitetsmerknaden gjeld.

  har_tekstdel:
    slot_uri: oa:hasBody
    range: Tekstdel
    multivalued: true
    description: Tekstleg innhald i merknaden (0..n).

  # har_maal brukar range: uriorcurie her (ikkje KatalogisertRessurs) for å unngå
  # sirkulær import. dqv-ap-no narrowar rangen til KatalogisertRessurs via slot_usage.
  har_maal:
    slot_uri: oa:hasTarget
    range: uriorcurie
    description: Datasett, distribusjon eller datatjeneste merknaden gjeld.

  # gjelder_standard brukar range: uriorcurie (ikkje Standard) av samme grunn
  # som har_maal ovanfor: Standard er definert i dcat-ap-no-schema.yaml, som
  # importerer dqv-core-schema.yaml — ein direkte klassereferanse her ville
  # skapt sirkulær import. Sjå BUG-6 i specs/bugs/ for kvifor dette slottet
  # ligg her (på Kvalitetsdimensjon) i staden for som eit slot på Standard.
  gjelder_standard:
    slot_uri: dqvno:appliesToStandard
    range: uriorcurie
    multivalued: true
    description: Standard(ar) denne kvalitetsdimensjonen gjeld for.

  er_kvalitetsmaaling_av:
    slot_uri: dqv:isMeasurementOf
    range: Kvalitetsmaal
    description: Kvalitetsmålet denne målinga er ei måling av.

  har_boolean_verdi:
    slot_uri: dqv:value
    range: boolean
    description: Målt verdi som sann/usann (xsd:boolean).

  har_numerisk_verdi:
    slot_uri: dqv:value
    range: double
    description: Målt verdi som desimaltal eller heiltal (xsd:double).

  har_tekst_verdi:
    slot_uri: dqv:value
    range: string
    description: Målt verdi som fritekst (rdfs:Literal).

  har_verdi_tekstdel:
    slot_uri: rdfs:value
    range: string
    description: Tekstinnhaldet i tekstdelen.

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

enums:

  DqvMotivasjon:
    description: >-
      Gyldige motivasjonsverdiar for kvalitetsmerknader per DQV-AP-NO og
      dqvno-vokabularet.
    permissible_values:
      assessing:
        meaning: oa:assessing
        description: Allgemein vurdering av kvalitet.
      classifying:
        meaning: oa:classifying
        description: Klassifisering av kvalitet.
      availability:
        meaning: dqvno:availability
        description: Tilgjengelegheit.
      completeness:
        meaning: dqvno:completeness
        description: Fullstendigheit.
      currentness:
        meaning: dqvno:currentness
        description: Aktualitet.
      validity:
        meaning: dqvno:validity
        description: Gyldighet.
      accuracy:
        meaning: dqvno:accuracy
        description: Nøyaktigheit.
