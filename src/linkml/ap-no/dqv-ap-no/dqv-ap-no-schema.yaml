# Alle DQV-kjerneklassar (Kvalitetsmerknad, Kvalitetsmaaling, Tekstdel m.fl.)
# og -slots (har_kvalitetsmerknad, har_kvalitetsmaaling, o.a.) er definerte i
# dqv-core-schema.yaml, som vert importert transitivt via dcat-ap-no-schema.
#
# dqv-ap-no bidreg med:
#   1. Narrowing av har_maal.range frå uriorcurie til KatalogisertRessurs
#   2. Standard-klasse override med er_i_kvalitetsdimensjon (DQV-spesifikt slot)

# ---------------------------------------------------------------------------
# Klasser
# ---------------------------------------------------------------------------

classes:

  # Standard-klassen er definert i dcat-ap-no-schema.yaml (importert).
  # Her vert berre det DQV-spesifikke slottet lagt til via class override.
  Standard:
    description: Ein standard eller spesifikasjon som eit datasett er i samsvar med.
    slots:
      - er_i_kvalitetsdimensjon
    slot_usage:
      er_i_kvalitetsdimensjon:
        in_subset:
          - Anbefalt

# ---------------------------------------------------------------------------
# Slots (berre DQV-AP-NO-spesifikke — ikkje i dqv-core)
# ---------------------------------------------------------------------------

slots:

  # er_i_samsvar_med er definert i dcat-ap-no-schema.yaml (importert).
