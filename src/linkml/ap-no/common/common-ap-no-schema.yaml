id: https://data.norge.no/ap-no/common-ap-no
name: common-ap-no
title: Common AP-NO
version: "1.0.0"
license: https://data.norge.no/nlod/no/2.0
description: >-
  Felles typar, subsets, klassar og slots som går igjen i alle norske
  W3C-applikasjonsprofiler (AP-NO). Importerast av dei einskilde profilane.

annotations:
  utgiver: https://data.norge.no/organizations/991825827
  endringsdato: "2026-06-10"
  utgivelsesdato: "2023-01-01"
  status: http://purl.org/adms/status/UnderDevelopment

prefixes:
  linkml:  https://w3id.org/linkml/
  capno:   https://data.norge.no/ap-no/common-ap-no/
  adms:    http://www.w3.org/ns/adms#
  cv:      http://data.europa.eu/m8g/
  dcat:    http://www.w3.org/ns/dcat#
  dct:     http://purl.org/dc/terms/
  foaf:    http://xmlns.com/foaf/0.1/
  skos:    http://www.w3.org/2004/02/skos/core#
  rdfs:    http://www.w3.org/2000/01/rdf-schema#
  xsd:     http://www.w3.org/2001/XMLSchema#
  rdf:     http://www.w3.org/1999/02/22-rdf-syntax-ns#
  owl:     http://www.w3.org/2002/07/owl#

default_prefix: https://data.norge.no/ap-no/common-ap-no/
default_range: string

imports:
  - linkml:types

# ---------------------------------------------------------------------------
# Typar
# ---------------------------------------------------------------------------

types:

  Spraak:
    uri: dct:language
    base: str
    description: Språk
  
  LangString:
    uri: rdf:langString
    base: str
    description: Språktagget streng (rdf:langString).

  NonNegativeInteger:
    uri: xsd:nonNegativeInteger
    base: int
    minimum_value: 0
    description: Ikkje-negativ heltalsverdi (xsd:nonNegativeInteger).

  Duration:
    uri: xsd:duration
    base: str
    description: ISO 8601-varigheit (xsd:duration), t.d. PT15M.

  GYear:
    uri: xsd:gYear
    base: str
    description: Gregorisk årstal (xsd:gYear), t.d. 2024.

# ---------------------------------------------------------------------------
# Enumerasjonar
# ---------------------------------------------------------------------------

enums:

  EULicence:
    description: >-
      EU Licence-vokabularet frå Publications Office.
      Kjelde: http://publications.europa.eu/resource/authority/licence/
    permissible_values:
      CC0:
        description: Creative Commons Zero 1.0 Universal
        meaning: http://publications.europa.eu/resource/authority/licence/CC0
      CC_BY_4_0:
        description: Creative Commons Attribution 4.0 International
        meaning: http://publications.europa.eu/resource/authority/licence/CC_BY_4_0
      NLOD_2_0:
        description: Norwegian Licence for Open Government Data 2.0
        meaning: http://publications.europa.eu/resource/authority/licence/NLOD_2_0
      CC_BYSA_4_0:
        description: Creative Commons Attribution-ShareAlike 4.0 International
        meaning: http://publications.europa.eu/resource/authority/licence/CC_BYSA_4_0
      MIT:
        description: MIT License
        meaning: http://publications.europa.eu/resource/authority/licence/MIT
      APACHE_2_0:
        description: Apache License 2.0
        meaning: http://publications.europa.eu/resource/authority/licence/APACHE_2_0
      GPL_3_0:
        description: GNU General Public License 3.0
        meaning: http://publications.europa.eu/resource/authority/licence/GPL_3_0
      EUPL_1_2:
        description: European Union Public Licence 1.2
        meaning: http://publications.europa.eu/resource/authority/licence/EUPL_1_2

  EUDistributionStatus:
    description: >-
      EU Dataset/Distribution status-vokabularet frå Publications Office.
      Kjelde: http://publications.europa.eu/resource/authority/dataset-status/
    permissible_values:
      COMPLETED:
        description: Ferdigstilt (Completed)
        meaning: http://publications.europa.eu/resource/authority/dataset-status/COMPLETED
      DEPRECATED:
        description: Foreldet (Deprecated)
        meaning: http://publications.europa.eu/resource/authority/dataset-status/DEPRECATED
      DEVELOP:
        description: Under utvikling (Under development)
        meaning: http://publications.europa.eu/resource/authority/dataset-status/DEVELOP
      WITHDRAWN:
        description: Trukket tilbake (Withdrawn)
        meaning: http://publications.europa.eu/resource/authority/dataset-status/WITHDRAWN
      DISCONT:
        description: Nedlagt (Discontinued)
        meaning: http://publications.europa.eu/resource/authority/dataset-status/DISCONT
      OP_DATPRO:
        description: I produksjon (Operational data processing)
        meaning: http://publications.europa.eu/resource/authority/dataset-status/OP_DATPRO

# ---------------------------------------------------------------------------
# Subsets
# ---------------------------------------------------------------------------

subsets:

  Obligatorisk:
    description: Obligatoriske eigenskapar i ein AP-NO-profil.

  Anbefalt:
    description: Anbefalte eigenskapar i ein AP-NO-profil.

  Valgfri:
    description: Valfrie eigenskapar i ein AP-NO-profil.

  Metadata:
    description: Klasser som beskriv metadata om ressursar, ikkje sjølve datainnhaldet.

# ---------------------------------------------------------------------------
# Klassar
# ---------------------------------------------------------------------------

classes:

  Lisensdokument:
    in_subset:
      - Metadata
    class_uri: dct:LicenseDocument
    description: Eit lisensdokument (dct:LicenseDocument).
    slots:
      - id
      - type_concept

  Mediatype:
    class_uri: dct:MediaTypeOrExtent
    description: Ein medietype eller filformat (dct:MediaTypeOrExtent).
    slots:
      - id

  Konsept:
    class_uri: skos:Concept
    description: Referanse til eit SKOS-omgrep frå eit kontrollert vokabular.
    slots:
      - id
    see_also:
      - https://data.norge.no/concepts/02131737-bb20-3204-93e0-46678b7d57be

  Begrepssamling:
    class_uri: skos:ConceptScheme
    description: Ei SKOS-omgrepssamling (temavokabular).
    slots:
      - id

# ---------------------------------------------------------------------------
# Slots
# ---------------------------------------------------------------------------

slots:

  id:
    identifier: true
    range: uriorcurie
    description: URI-identifikator for ressursen.

  tittel:
    slot_uri: dct:title
    range: LangString
    multivalued: true
    description: Namn/tittel på ressursen (dct:title).

  beskrivelse:
    slot_uri: dct:description
    range: LangString
    multivalued: true
    description: Fritekstbeskrivelse av ressursen (dct:description).

  identifikator_literal:
    slot_uri: dct:identifier
    range: string
    description: Tekstleg identifikator for ressursen (dct:identifier).

  type_concept:
    slot_uri: dct:type
    range: Konsept
    description: Type ressurs frå eit kontrollert vokabular (dct:type).

  endringsdato:
    slot_uri: dct:modified
    range: date
    description: Dato for siste endring av ressursen (dct:modified).

  utgivelsesdato:
    slot_uri: dct:issued
    range: date
    description: Dato ressursen vart første gong publisert (dct:issued).

  spraak:
    slot_uri: dct:language
    range: Spraak
    multivalued: true
    description: Språk brukt i ressursen (dct:language).

  format:
    slot_uri: dct:format
    range: string
    description: Filformat eller medietype (dct:format).

  har_referanse:
    slot_uri: rdfs:seeAlso
    range: uri
    multivalued: true
    description: Referanse til ekstern ressurs (rdfs:seeAlso).

  har_merknad:
    slot_uri: rdfs:comment
    range: LangString
    multivalued: true
    description: Fritekstmerknad (rdfs:comment).

  versjonsnummer:
    slot_uri: owl:versionInfo
    range: string
    description: Versjonsnummer for ressursen (owl:versionInfo).

  nokkelord:
    slot_uri: dcat:keyword
    range: LangString
    multivalued: true
    description: Nøkkelord som beskriv ressursen (dcat:keyword).

  dekningsomraade:
    slot_uri: dct:spatial
    range: Konsept
    multivalued: true
    description: Geografisk dekningsområde (dct:spatial).

  status:
    slot_uri: adms:status
    range: Konsept
    description: >-
      Status for ressursen frå eit kontrollert vokabular (adms:status). Verdien SKAL
      veljast frå EUs kontrollerte vokabular Distribution status
      (http://publications.europa.eu/resource/authority/dataset-status/).
      Sjå enumerasjonen EUDistributionStatus for tilgjengelege statusar.
    annotations:
      gyldige_verdier: http://publications.europa.eu/resource/authority/dataset-status/

  valuta:
    slot_uri: cv:currency
    range: Konsept
    description: Valuta (cv:currency).

  heimeside:
    slot_uri: foaf:homepage
    range: uri
    multivalued: true
    description: Heimeside for ressursen eller organisasjonen (foaf:homepage).

  anbefalt_term:
    slot_uri: skos:prefLabel
    range: LangString
    multivalued: true
    description: Føretrukke term/namn for ressursen (skos:prefLabel).

  versjonsmerknad:
    slot_uri: adms:versionNotes
    range: LangString
    multivalued: true
    description: Merknad om endringar i denne versjonen (adms:versionNotes).

  lisens:
    slot_uri: dct:license
    range: Lisensdokument
    description: >-
      Lisens for bruk av ressursen (dct:license). Verdien SKAL veljast frå EUs
      kontrollerte vokabular Licence (http://publications.europa.eu/resource/authority/licence/).
      For norske offentlege data er CC BY 4.0 eller NLOD 2.0 anbefalt per retningslinjene.
      Sjå enumerasjonen EULicence for dei mest brukte lisensane.
    annotations:
      gyldige_verdier: http://publications.europa.eu/resource/authority/licence/
