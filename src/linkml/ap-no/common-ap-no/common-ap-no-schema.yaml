id: https://data.norge.no/ap-no/common-ap-no
name: common-ap-no
title: Common AP-NO
version: "1.0.0"
license: https://data.norge.no/nlod/no/2.0
description: >-
  Felles typar, subsets, klassar og slots som går igjen i alle norske
  W3C-applikasjonsprofiler (AP-NO). Importerast av dei einskilde profilane.

annotations:
  utgiver: https://data.norge.no/organizations/991825827
  endringsdato: "2026-06-10"
  utgivelsesdato: "2023-01-01"
  status: http://purl.org/adms/status/UnderDevelopment

prefixes:
  linkml:  https://w3id.org/linkml/
  capno:   https://data.norge.no/ap-no/common-ap-no/
  adms:    http://www.w3.org/ns/adms#
  cv:      http://data.europa.eu/m8g/
  dcat:    http://www.w3.org/ns/dcat#
  dct:     http://purl.org/dc/terms/
  foaf:    http://xmlns.com/foaf/0.1/
  skos:    http://www.w3.org/2004/02/skos/core#
  rdfs:    http://www.w3.org/2000/01/rdf-schema#
  xsd:     http://www.w3.org/2001/XMLSchema#
  rdf:     http://www.w3.org/1999/02/22-rdf-syntax-ns#
  owl:     http://www.w3.org/2002/07/owl#

default_prefix: https://data.norge.no/ap-no/common-ap-no/
default_range: string

imports:
  - linkml:types

# ---------------------------------------------------------------------------
# Typar
# ---------------------------------------------------------------------------

types:

  LangString:
    uri: rdf:langString
    base: str
    description: Språktagget streng (rdf:langString).

  NonNegativeInteger:
    uri: xsd:nonNegativeInteger
    base: int
    minimum_value: 0
    description: Ikkje-negativ heltalsverdi (xsd:nonNegativeInteger).

  Duration:
    uri: xsd:duration
    base: str
    description: ISO 8601-varigheit (xsd:duration), t.d. PT15M.

  GYear:
    uri: xsd:gYear
    base: str
    description: Gregorisk årstal (xsd:gYear), t.d. 2024.

# ---------------------------------------------------------------------------
# Enumerasjonar
# ---------------------------------------------------------------------------

enums:

  EULicence:
    description: >-
      EU Licence-vokabularet frå Publications Office.
      Kjelde: http://publications.europa.eu/resource/authority/licence/
    permissible_values:
      CC0:
        description: Creative Commons Zero 1.0 Universal
        meaning: http://publications.europa.eu/resource/authority/licence/CC0
      CC_BY_4_0:
        description: Creative Commons Attribution 4.0 International
        meaning: http://publications.europa.eu/resource/authority/licence/CC_BY_4_0
      NLOD_2_0:
        description: Norwegian Licence for Open Government Data 2.0
        meaning: http://publications.europa.eu/resource/authority/licence/NLOD_2_0
      CC_BYSA_4_0:
        description: Creative Commons Attribution-ShareAlike 4.0 International
        meaning: http://publications.europa.eu/resource/authority/licence/CC_BYSA_4_0
      MIT:
        description: MIT License
        meaning: http://publications.europa.eu/resource/authority/licence/MIT
      APACHE_2_0:
        description: Apache License 2.0
        meaning: http://publications.europa.eu/resource/authority/licence/APACHE_2_0
      GPL_3_0:
        description: GNU General Public License 3.0
        meaning: http://publications.europa.eu/resource/authority/licence/GPL_3_0
      EUPL_1_2:
        description: European Union Public Licence 1.2
        meaning: http://publications.europa.eu/resource/authority/licence/EUPL_1_2

  EUFileType:
    description: >-
      EU File type-vokabularet frå Publications Office.
      Kjelde: http://publications.europa.eu/resource/authority/file-type/
    permissible_values:
      RDF_TURTLE:
        description: RDF Turtle
        meaning: http://publications.europa.eu/resource/authority/file-type/RDF_TURTLE
      RDF_XML:
        description: RDF XML
        meaning: http://publications.europa.eu/resource/authority/file-type/RDF_XML
      JSON_LD:
        description: JSON-LD
        meaning: http://publications.europa.eu/resource/authority/file-type/JSON_LD
      JSON:
        description: JSON
        meaning: http://publications.europa.eu/resource/authority/file-type/JSON
      XML:
        description: XML
        meaning: http://publications.europa.eu/resource/authority/file-type/XML
      HTML:
        description: HTML
        meaning: http://publications.europa.eu/resource/authority/file-type/HTML
      PDF:
        description: PDF
        meaning: http://publications.europa.eu/resource/authority/file-type/PDF
      CSV:
        description: CSV
        meaning: http://publications.europa.eu/resource/authority/file-type/CSV
      YAML:
        description: YAML
        meaning: http://publications.europa.eu/resource/authority/file-type/YAML

  EULanguage:
    description: >-
      EU Language-vokabularet frå Publications Office.
      Kjelde: http://publications.europa.eu/resource/authority/language/
    permissible_values:
      NOB:
        description: Norsk bokmål
        meaning: http://publications.europa.eu/resource/authority/language/NOB
      NNO:
        description: Nynorsk
        meaning: http://publications.europa.eu/resource/authority/language/NNO
      NOR:
        description: Norsk (uspesifisert)
        meaning: http://publications.europa.eu/resource/authority/language/NOR
      SME:
        description: Nordsamisk
        meaning: http://publications.europa.eu/resource/authority/language/SME
      SMA:
        description: Sørsamisk
        meaning: http://publications.europa.eu/resource/authority/language/SMA
      SMJ:
        description: Lulesamisk
        meaning: http://publications.europa.eu/resource/authority/language/SMJ
      ENG:
        description: Engelsk
        meaning: http://publications.europa.eu/resource/authority/language/ENG

  ADMSStatus:
    description: >-
      ADMS Status-vokabularet.
      Kjelde: http://purl.org/adms/status/
    permissible_values:
      COMPLETED:
        description: Ferdigstilt (Completed)
        meaning: http://purl.org/adms/status/Completed
      DEPRECATED:
        description: Foreldet (Deprecated)
        meaning: http://purl.org/adms/status/Deprecated
      UNDER_DEVELOPMENT:
        description: Under utvikling (Under development)
        meaning: http://purl.org/adms/status/UnderDevelopment
      WITHDRAWN:
        description: Trukket tilbake (Withdrawn)
        meaning: http://purl.org/adms/status/Withdrawn

  EUAccessRight:
    description: >-
      EU Access Right-vokabularet frå Publications Office.
      Kjelde: http://publications.europa.eu/resource/authority/access-right/
    permissible_values:
      PUBLIC:
        description: Offentleg tilgjengeleg - ingen tilgangsrestriksjonar
        meaning: http://publications.europa.eu/resource/authority/access-right/PUBLIC
      RESTRICTED:
        description: Avgrensa tilgang - krev særskilde vilkår eller godkjenning
