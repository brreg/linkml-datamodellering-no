name: Oppdater schema-versjonar i release-PR

# Denne workflowen triggas når release-please-workflowen opprettar eller oppdaterer ein release-PR.
# Den oppdaterer version, endringsdato og utgivelsesdato i alle endra schema-filer og pushar til PR-branchen.

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  update-schemas:
    # Køyr berre for release-please PR-ar (sjekk tittel-mønster)
    if: "startsWith(github.event.pull_request.title, 'chore(main): release')"
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Sjekk ut PR-branchen
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Oppdater schema-versjonar og datofelt
        run: |
          # Hent dagens dato i ISO 8601-format
          TODAY=$(date -u +%Y-%m-%d)

          # Les alle pakke-paths frå .release-please-manifest.json
          jq -r 'keys[]' .release-please-manifest.json | while read pkg_path; do
            # Hent versjon frå manifest
            version=$(jq -r --arg path "$pkg_path" '.[$path]' .release-please-manifest.json)

            # Finn schema-fila i pakken
            schema=$(find "$pkg_path" -maxdepth 1 -name "*-schema.yaml" 2>/dev/null | head -1)

            if [ -n "$schema" ] && [ -f "$schema" ]; then
              # Les noverande versjon frå schema
              current_version=$(yq eval '.version' "$schema" 2>/dev/null || echo "")

              # Oppdater berre dersom versjon har endra seg
              if [ "$current_version" != "\"$version\"" ] && [ "$current_version" != "$version" ]; then
                echo "Oppdaterer $schema frå $current_version til $version"

                # Oppdater version, endringsdato og utgivelsesdato
                yq eval -i ".version = \"$version\"" "$schema"
                yq eval -i ".annotations.endringsdato = \"$TODAY\"" "$schema"

                # Sett utgivelsesdato kun dersom den ikkje allereie er sett
                current_issued=$(yq eval '.annotations.utgivelsesdato' "$schema" 2>/dev/null || echo "null")
                if [ "$current_issued" = "null" ] || ! echo "$current_issued" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
                  yq eval -i ".annotations.utgivelsesdato = \"$TODAY\"" "$schema"
                fi
              fi
            fi
          done

      - name: Commit og push endringane til PR-branchen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if ! git diff --staged --quiet; then
            git commit -m "chore: oppdater schema-versjonar og datofelt [skip ci]"
            git push
            echo "Schema-filer oppdaterte og pusha til PR-branchen"
          else
            echo "Ingen endringar i schema-filer — hoppar over commit"
          fi
