name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:

  build-validator:
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Logg inn på GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Bygg og push mcp-linkml-validator image
        run: |
          if podman pull ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ github.sha }} 2>/dev/null; then
            echo "Image finst allereie i GHCR, hoppar over bygging"
          else
            make mcp-val-build
            podman tag mcp-linkml-validator ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ github.sha }}
            podman push ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ github.sha }}
            podman tag mcp-linkml-validator ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:latest
            podman push ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:latest
          fi

  validate-ap-no:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: ap-no
      - uses: ./.github/actions/validate-examples
        with:
          domain: ap-no

  validate-fair:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: fair
      - uses: ./.github/actions/validate-examples
        with:
          domain: fair

  validate-fint:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: fint
      - uses: ./.github/actions/validate-examples
        with:
          domain: fint

  validate-ngr:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: ngr
      - uses: ./.github/actions/validate-examples
        with:
          domain: ngr

  validate-oreg:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: oreg
      - uses: ./.github/actions/validate-examples
        with:
          domain: oreg

  validate-samt:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: samt
      - uses: ./.github/actions/validate-examples
        with:
          domain: samt
