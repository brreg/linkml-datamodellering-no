name: Validate

# Validerer alle skjema, eksempelfiler og datafiler mot bronze-policy og
# publiseringspolicyer. Validation-loggar vert lagra til validation/logs/
# og committed til main (berre på push, ikkje PR).
#
# Loggar vert lagra per versjon i validation/logs/<domain>/<model>/<version>/:
# - bronze.json: skjema-validering mot bronze-policy
# - examples.json: eksempelfil-validering
# - data-<katalog>.json: datafil-validering mot publiseringspolicy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/linkml/**'
      - 'src/mcp-linkml-validator/**'
  pull_request:
    paths:
      - 'src/linkml/**'
      - 'src/mcp-linkml-validator/**'

jobs:

  check-publish-version:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Krev version:-felt i alle publish_external-skjema
        run: |
          fail=0
          for mf in $(find src/linkml -name "manifest.yaml"); do
            grep -q "publish_external: true" "$mf" || continue
            grep -q "generators:" "$mf" || continue
            dir=$(dirname "$mf")
            schema=$(find "$dir" -maxdepth 1 -name "*-schema.yaml" | head -1)
            [[ -z "$schema" ]] && continue
            if ! grep -q "^version:" "$schema"; then
              echo "FEIL: $schema manglar version:-felt (publish_external: true)"
              fail=1
            fi
          done
          exit $fail

  commitlint:
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Valider commit-meldingar (conventional commits)
        run: |
          podman run --rm \
            -v "$PWD:/repo" -w /repo \
            --entrypoint="" \
            node:22-alpine \
            sh -c "apk add --no-cache git 2>/dev/null && \
              npm install --save-dev @commitlint/cli @commitlint/config-conventional 2>/dev/null && \
              echo 'module.exports={extends:[\"@commitlint/config-conventional\"]}' > commitlint.config.js && \
              npx commitlint --from origin/${{ github.base_ref }} --to HEAD"

  checkout-source:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/upload-artifact@v7
        with:
          name: source
          path: |
            src/
            .github/
            Makefile
          retention-days: 1

  build-validator:
    needs: [checkout-source]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source
      - name: Cache mcp-linkml-validator image
        id: cache
        uses: actions/cache@v6
        with:
          path: mcp-linkml-validator.tar.zst
          key: mcp-linkml-validator-${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
      - name: Bygg mcp-linkml-validator image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          make mcp-val-build
          podman save mcp-linkml-validator | zstd -T0 > mcp-linkml-validator.tar.zst
      - name: Logg inn på GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Sjekk om image finst i GHCR
        id: ghcr-check
        if: steps.cache.outputs.cache-hit == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
          if podman pull "$IMAGE" 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Last inn image frå cache
        if: steps.cache.outputs.cache-hit == 'true' && steps.ghcr-check.outputs.exists != 'true'
        run: podman load < <(zstd -d -c mcp-linkml-validator.tar.zst)
      - name: Push til GHCR
        if: steps.ghcr-check.outputs.exists != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
          podman tag mcp-linkml-validator "$IMAGE"
          podman push "$IMAGE"

  validate:
    name: "validate / ${{ matrix.domain }}"
    needs: build-validator
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        domain: [ap-no, begrepskatalog, fair, fint, modellkatalog, ngr, oreg, samt]
      fail-fast: false
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source

      - name: Cache validering (${{ matrix.domain }})
        id: cache-validated
        uses: actions/cache@v6
        with:
          path: .validated-${{ matrix.domain }}
          key: validated-${{ matrix.domain }}-${{ hashFiles(format('src/linkml/{0}/**', matrix.domain), 'src/mcp-linkml-validator/server.py', 'src/mcp-linkml-validator/policies/**', 'src/mcp-linkml-validator/flatten-and-validate.bash', 'src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt', '.github/workflows/validate.yml') }}

      - name: Logg inn på GHCR
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Hent validator-image frå GHCR
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
          podman pull "$IMAGE"
          podman tag "$IMAGE" mcp-linkml-validator:latest

      - name: Valider mot bronze-policy
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: make domain-validate-bronze DOMAIN=${{ matrix.domain }}

      - name: Valider eksempelfiler mot skjema
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: make domain-validate-examples DOMAIN=${{ matrix.domain }}

      - name: Valider datafiler mot publiseringspolicyer
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: make domain-validate-data DOMAIN=${{ matrix.domain }}

      - name: Sjekk at publiserte URI-ar ikkje er fjerna
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: make check-published-uris

      - name: Merk validering som vellykka
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: touch .validated-${{ matrix.domain }}

      - name: Last opp validation-loggar
        if: steps.cache-validated.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: validation-logs-${{ matrix.domain }}
          path: validation/logs/
          retention-days: 7
          if-no-files-found: ignore

  commit-validation-logs:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Last ned validation-loggar frå alle domene
        uses: actions/download-artifact@v8
        with:
          pattern: validation-logs-*
          path: validation/logs
          merge-multiple: true

      - name: Commit og push validation-loggar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "validation/logs" ] && [ -n "$(ls -A validation/logs 2>/dev/null)" ]; then
            git add validation/logs/
            if ! git diff --cached --quiet; then
              git commit -m "chore(validering): oppdater validation-loggar [skip ci]"
              git push
            else
              echo "Ingen nye validation-loggar å committe"
            fi
          else
            echo "Ingen validation-loggar å committe"
          fi
