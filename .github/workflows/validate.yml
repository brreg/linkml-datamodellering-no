name: Validate

# Validerer alle skjema, eksempelfiler og datafiler mot validation_policy og
# publiseringspolicyer. Validation-loggar vert lagra til src/linkml/*/validation/
# og committed via PR (ikkje direkte til main).
#
# Loggar vert lagra per versjon i src/linkml/<domain>/<model>/validation/<version>/:
# - <policy>.json: skjema-validering mot validation_policy frå manifest.yaml
# - instance-<namn>.json: eksempelfil-validering

on:
  schedule:
    - cron: '0 2 * * *'  # Nattleg validering kl 02:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/linkml/**'
      - 'src/mcp-linkml-validator/**'

jobs:

  check-publish-version:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Krev version:-felt i alle publish_external-skjema
        run: |
          fail=0
          for mf in $(find src/linkml -name "manifest.yaml"); do
            grep -q "publish_external: true" "$mf" || continue
            grep -q "generators:" "$mf" || continue
            dir=$(dirname "$mf")
            schema=$(find "$dir" -maxdepth 1 -name "*-schema.yaml" | head -1)
            [[ -z "$schema" ]] && continue
            if ! grep -q "^version:" "$schema"; then
              echo "FEIL: $schema manglar version:-felt (publish_external: true)"
              fail=1
            fi
          done
          exit $fail

  commitlint:
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Valider commit-meldingar (conventional commits)
        run: |
          podman run --rm \
            -v "$PWD:/repo" -w /repo \
            --entrypoint="" \
            node:22-alpine \
            sh -c "apk add --no-cache git 2>/dev/null && \
              npm install --save-dev @commitlint/cli @commitlint/config-conventional 2>/dev/null && \
              echo 'module.exports={extends:[\"@commitlint/config-conventional\"]}' > commitlint.config.js && \
              npx commitlint --from origin/${{ github.base_ref }} --to HEAD"

  checkout-source:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/upload-artifact@v7
        with:
          name: source
          path: |
            src/
            .github/
            Makefile
          retention-days: 1

  build-validator:
    needs: [checkout-source]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source
      - name: Cache mcp-linkml-validator image
        id: cache
        uses: actions/cache@v6
        with:
          path: mcp-linkml-validator.tar.zst
          key: mcp-linkml-validator-${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
      - name: Bygg mcp-linkml-validator image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          make mcp-val-build
          podman save mcp-linkml-validator | zstd -T0 > mcp-linkml-validator.tar.zst
      - name: Logg inn på GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Sjekk om image finst i GHCR
        id: ghcr-check
        if: steps.cache.outputs.cache-hit == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
          if podman pull "$IMAGE" 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Last inn image frå cache
        if: steps.cache.outputs.cache-hit == 'true' && steps.ghcr-check.outputs.exists != 'true'
        run: podman load < <(zstd -d -c mcp-linkml-validator.tar.zst)
      - name: Push til GHCR
        if: steps.ghcr-check.outputs.exists != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
          podman tag mcp-linkml-validator "$IMAGE"
          podman push "$IMAGE"

  validate:
    name: "validate / ${{ matrix.domain }}"
    needs: build-validator
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        domain: [ap-no, begrepskatalog, fair, fint, modellkatalog, ngr, oreg, samt]
      fail-fast: false
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source

      - name: Cache validering (${{ matrix.domain }})
        id: cache-validated
        uses: actions/cache@v6
        with:
          path: .validated-${{ matrix.domain }}
          key: validated-${{ matrix.domain }}-${{ hashFiles(format('src/linkml/{0}/**', matrix.domain), 'src/mcp-linkml-validator/server.py', 'src/mcp-linkml-validator/policies/**', 'src/mcp-linkml-validator/flatten-and-validate.bash', 'src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt', '.github/workflows/validate.yml') }}

      - name: Logg inn på GHCR
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Hent validator-image frå GHCR
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
          podman pull "$IMAGE"
          podman tag "$IMAGE" mcp-linkml-validator:latest

      - name: Valider skjema mot validation_policy
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: |
          # Valider alle skjema i dette domenet med validation_policy frå manifest.yaml
          for manifest in $(find src/linkml/${{ matrix.domain }} -name manifest.yaml -type f); do
            if grep -q "^generators:" "$manifest"; then
              echo "Validerer skjema frå manifest: $manifest"
              bash src/assets/scripts/run-validation.sh --manifest "$manifest" || true
            fi
          done

      - name: Valider eksempelfiler mot skjema
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: make domain-validate-examples DOMAIN=${{ matrix.domain }}

      - name: Valider datafiler mot publiseringspolicyer
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: make domain-validate-data DOMAIN=${{ matrix.domain }}

      - name: Sjekk at publiserte URI-ar ikkje er fjerna
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: make check-published-uris

      - name: Merk validering som vellykka
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: touch .validated-${{ matrix.domain }}

      - name: Last opp validation-loggar
        if: steps.cache-validated.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: validation-logs-${{ matrix.domain }}
          path: src/linkml/${{ matrix.domain }}/**/validation/
          retention-days: 7
          if-no-files-found: ignore

  create-pr-with-validation-logs:
    needs: validate
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Last ned validation-loggar frå alle domene
        uses: actions/download-artifact@v8
        with:
          pattern: validation-logs-*
          path: src/linkml/
          merge-multiple: true

      - name: Filtrer ut uendra loggar
        run: |
          # Python-script som samanliknar nye loggar med git HEAD
          # Fjernar identiske loggar (ignorer validated_at-felt)
          python3 src/assets/scripts/filter-unchanged-logs.py

      - name: Sjekk om det finst endringar
        id: check_changes
        run: |
          if git diff --quiet src/linkml/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # Tell kor mange modellar som er endra
            changed_count=$(git diff --name-only src/linkml/ | grep 'validation/.*\.json$' | wc -l)
            echo "changed_count=$changed_count" >> $GITHUB_OUTPUT
          fi

      - name: Lag PR med valideringsloggar
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(validation): oppdater valideringsloggar (${{ steps.check_changes.outputs.changed_count }} modellar)"
          branch: validation-logs-update
          delete-branch: true
          title: "chore(validation): oppdater valideringsloggar (${{ steps.check_changes.outputs.changed_count }} modellar)"
          body: |
            Automatisk oppdatering av valideringsloggar frå nattleg validering.

            **Endra:** ${{ steps.check_changes.outputs.changed_count }} modell(ar)

            Sjekk diff for å sjå nye violations eller forbettringar.
          labels: automated, validation
