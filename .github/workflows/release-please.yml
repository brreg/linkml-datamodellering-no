name: Release Please

# Automatisk release-PR-oppretting og GitHub Releases:
# 1. Push til main med semantisk commit (feat/fix) som endrar *-schema.yaml
#    → release-please opprettar/oppdaterer release-PR automatisk
# 2. Brukar mergar release-PR manuelt
#    → GitHub Releases vert oppretta automatisk med artefaktar (JSON Schema, SHACL, OWL, osv.)
#
# Manuell trigger via workflow_dispatch er tilgjengeleg for admin.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
      releases: write
    steps:
      - name: Sjekk om siste commit skal trigge release-please
        id: check_commit_type
        if: github.event_name == 'push'
        run: |
          # Hent berre første linje av commit-meldinga
          COMMIT_MSG=$(cat <<'EOF'
          ${{ github.event.head_commit.message }}
          EOF
          )
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -n 1)

          if echo "$FIRST_LINE" | grep -qE '^(style|docs|chore|test|ci|build|perf|refactor)(\(.*\))?:'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Siste commit er ikkje ein release-utløysande type — hoppar over"
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Siste commit kan trigge release — held fram"

      - uses: googleapis/release-please-action@v5
        if: |
          (github.event_name == 'push' && steps.check_commit_type.outputs.skip != 'true') ||
          github.event_name == 'workflow_dispatch'
        id: release-please
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Informer om release-PR
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(echo '${{ steps.release-please.outputs.pr }}' | jq -r '.number')
          echo "::notice::Release-PR oppretta: https://github.com/${{ github.repository }}/pull/$PR_NUMBER"
          echo "Gå til PR-en, verifiser endringar, og merge når du er klar."

      - name: Checkout for artefakt-generering
        if: ${{ steps.release-please.outputs.releases_created == 'true' }}
        uses: actions/checkout@v7

      - name: Generer artefaktar for releases
        if: ${{ steps.release-please.outputs.releases_created == 'true' }}
        run: |
          # Installer podman (for containerbygging)
          sudo apt-get update && sudo apt-get install -y podman

          # Bygg nødvendige images
          make build-docker-linkml
          make build-docker-python
          make build-docker-avrotize

          # Generer artefaktar for kvar releaset pakke
          echo '${{ steps.release-please.outputs.paths_released }}' | jq -r '.[]' | while read pkg_path; do
            echo "Genererer artefaktar for $pkg_path"
            schema=$(find "$pkg_path" -maxdepth 1 -name "*-schema.yaml" | head -1)
            if [ -n "$schema" ]; then
              make gen-jsonschema SCHEMA="$schema"
              make gen-shacl SCHEMA="$schema"
              make gen-owl SCHEMA="$schema"
              make gen-jsonld SCHEMA="$schema"
              make gen-erdiagram SCHEMA="$schema"
            fi
          done

      - name: Last opp artefaktar til GitHub Releases
        if: ${{ steps.release-please.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Iterer gjennom alle releases som vart oppretta
          echo '${{ toJSON(steps.release-please.outputs) }}' | jq -r '.paths_released[]' | while read pkg_path; do
            # Hent tag-namn frå release-please outputs
            tag_name=$(echo '${{ toJSON(steps.release-please.outputs) }}' | jq -r --arg path "$pkg_path" '.releases[$path].tag_name')

            # Finn genererte artefaktar
            domain=$(echo "$pkg_path" | cut -d/ -f3)
            model=$(echo "$pkg_path" | cut -d/ -f4)

            echo "Lastar opp artefaktar for $model (tag: $tag_name)"

            # Last opp artefaktar (ignorer feil dersom filer ikkje finst)
            gh release upload "$tag_name" \
              "generated/$domain/$model/$model-schema.json" \
              "generated/$domain/$model/$model-shapes.ttl" \
              "generated/$domain/$model/$model-ontology.ttl" \
              "generated/$domain/$model/$model-context.jsonld" \
              "generated/$domain/$model/$model-erdiagram.md" \
              "$pkg_path/$model-schema.yaml" \
              --clobber || echo "::warning::Nokre artefaktar vart ikkje lasta opp for $model"
          done
