name: Release Please

# Automatisk release-PR-oppretting og GitHub Releases:
# 1. Push til main med semantisk commit (feat/fix) som endrar *-schema.yaml
#    → release-please opprettar/oppdaterer release-PR automatisk
# 2. Denne workflowen oppdaterer version, endringsdato og utgivelsesdato i *-schema.yaml
# 3. auto-approve-release-please.yml godkjenner PR-en automatisk
# 4. PR vert merga automatisk når alle checks passerer (auto-merge)
#    → GitHub Releases vert oppretta automatisk med artefaktar (JSON Schema, SHACL, OWL, osv.)
#
# Manuell trigger via workflow_dispatch er tilgjengeleg for admin.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Sjekk om siste commit skal trigge release-please
        id: check_commit_type
        if: github.event_name == 'push'
        run: |
          # Hent berre første linje av commit-meldinga
          COMMIT_MSG=$(cat <<'EOF'
          ${{ github.event.head_commit.message }}
          EOF
          )
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -n 1)

          if echo "$FIRST_LINE" | grep -qE '^(style|docs|chore|test|ci|build|perf|refactor)(\(.*\))?:'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Siste commit er ikkje ein release-utløysande type — hoppar over"
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Siste commit kan trigge release — held fram"

      - name: Checkout for release-please
        if: |
          (github.event_name == 'push' && steps.check_commit_type.outputs.skip != 'true') ||
          github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v7

      - uses: googleapis/release-please-action@v5
        if: |
          (github.event_name == 'push' && steps.check_commit_type.outputs.skip != 'true') ||
          github.event_name == 'workflow_dispatch'
        id: release-please
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Oppdater schema-versjonar i release-PR
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          PR_NUMBER=$(echo '${{ steps.release-please.outputs.pr }}' | jq -r '.number')
          BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName -q .headRefName)

          echo "Sjekkar ut PR-branch: $BRANCH"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          # Installer yq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # Hent dagens dato i ISO 8601-format
          TODAY=$(date -u +%Y-%m-%d)

          # Les alle pakke-paths frå .release-please-manifest.json
          jq -r 'keys[]' .release-please-manifest.json | while read pkg_path; do
            # Hent versjon frå manifest
            version=$(jq -r --arg path "$pkg_path" '.[$path]' .release-please-manifest.json)

            # Finn schema-fila i pakken
            schema=$(find "$pkg_path" -maxdepth 1 -name "*-schema.yaml" 2>/dev/null | head -1)

            if [ -n "$schema" ] && [ -f "$schema" ]; then
              # Les noverande versjon frå schema
              current_version=$(yq eval '.version' "$schema" 2>/dev/null || echo "")

              # Oppdater berre dersom versjon har endra seg
              if [ "$current_version" != "\"$version\"" ] && [ "$current_version" != "$version" ]; then
                echo "Oppdaterer $schema frå $current_version til $version"

                # Oppdater version, endringsdato og utgivelsesdato
                yq eval -i ".version = \"$version\"" "$schema"
                yq eval -i ".annotations.endringsdato = \"$TODAY\"" "$schema"

                # Sett utgivelsesdato kun dersom den ikkje allereie er sett
                current_issued=$(yq eval '.annotations.utgivelsesdato' "$schema" 2>/dev/null || echo "null")
                if [ "$current_issued" = "null" ] || ! echo "$current_issued" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
                  yq eval -i ".annotations.utgivelsesdato = \"$TODAY\"" "$schema"
                fi
              fi
            fi
          done

          # Commit og push endringane til PR-branchen
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if ! git diff --staged --quiet; then
            git commit -m "chore: oppdater schema-versjonar og datofelt [skip ci]"
            git push origin "$BRANCH"
            echo "Schema-filer oppdaterte og pusha til PR-branchen"
          else
            echo "Ingen endringar i schema-filer — hoppar over commit"
          fi

      - name: Informer om release-PR og aktiver auto-merge
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          PR_NUMBER=$(echo '${{ steps.release-please.outputs.pr }}' | jq -r '.number')
          echo "::notice::Release-PR oppretta: https://github.com/${{ github.repository }}/pull/$PR_NUMBER"

          # Aktiver auto-merge (vert merga når alle checks passerer og PR er godkjent)
          gh pr merge "$PR_NUMBER" --auto --squash
          echo "Auto-merge aktivert — PR vert merga automatisk når alle checks passerer."

      - name: Checkout for artefakt-generering
        if: ${{ steps.release-please.outputs.releases_created == 'true' }}
        uses: actions/checkout@v7

      - name: Generer artefaktar for releases
        if: ${{ steps.release-please.outputs.releases_created == 'true' }}
        run: |
          # Installer podman (for containerbygging)
          sudo apt-get update && sudo apt-get install -y podman

          # Bygg nødvendige images
          make build-docker-linkml
          make build-docker-python
          make build-docker-avrotize

          # Generer artefaktar for kvar releaset pakke
          echo '${{ steps.release-please.outputs.paths_released }}' | jq -r '.[]' | while read pkg_path; do
            echo "Genererer artefaktar for $pkg_path"
            schema=$(find "$pkg_path" -maxdepth 1 -name "*-schema.yaml" | head -1)
            if [ -n "$schema" ]; then
              make gen-jsonschema SCHEMA="$schema"
              make gen-shacl SCHEMA="$schema"
              make gen-owl SCHEMA="$schema"
              make gen-jsonld-context SCHEMA="$schema"
              make gen-erdiagram SCHEMA="$schema"
            fi
          done

      - name: Last opp artefaktar til GitHub Releases
        if: ${{ steps.release-please.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          # Iterer gjennom alle releases som vart oppretta
          echo '${{ toJSON(steps.release-please.outputs) }}' | jq -r '.paths_released[]' | while read pkg_path; do
            # Hent tag-namn frå release-please outputs
            tag_name=$(echo '${{ toJSON(steps.release-please.outputs) }}' | jq -r --arg path "$pkg_path" '.releases[$path].tag_name')

            # Finn genererte artefaktar
            domain=$(echo "$pkg_path" | cut -d/ -f3)
            model=$(echo "$pkg_path" | cut -d/ -f4)

            echo "Lastar opp artefaktar for $model (tag: $tag_name)"

            # Last opp artefaktar (ignorer feil dersom filer ikkje finst)
            gh release upload "$tag_name" \
              "generated/$domain/$model/$model-schema.json" \
              "generated/$domain/$model/$model-shapes.ttl" \
              "generated/$domain/$model/$model-ontology.ttl" \
              "generated/$domain/$model/$model-context.jsonld" \
              "generated/$domain/$model/$model-erdiagram.md" \
              "$pkg_path/$model-schema.yaml" \
              --clobber || echo "::warning::Nokre artefaktar vart ikkje lasta opp for $model"
          done
