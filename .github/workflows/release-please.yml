name: Release Please

# Automatisk release-flyt:
# 1. Push til main med semantisk commit (feat/fix) som endrar *-schema.yaml
#    → release-please opprettar/oppdaterer release-PR automatisk
# 2. Brukar mergar release-PR
#    → create-releases workflow opprettar faktiske releases og tags
#    → capture-validation og update-dates køyrer automatisk
#
# Manuell trigger via workflow_dispatch er framleis tilgjengeleg for admin.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/linkml/**/*-schema.yaml'

jobs:
  release-please:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Sjekk om siste commit skal trigge release-please
        id: check_commit_type
        if: github.event_name == 'push'
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qE '^(style|docs|chore|test|ci|build|perf|refactor)(\(.*\))?:'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Siste commit er ikkje ein release-utløysande type — hoppar over"
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Siste commit kan trigge release — held fram"

      # Køyrer release-please på push til main (opprettar/oppdaterer release-PR).
      # Hoppar over dersom dette er ein push-commit som ikkje er release-utløysande
      # (style/docs/chore/etc).
      - uses: googleapis/release-please-action@v5
        if: |
          (github.event_name == 'push' && steps.check_commit_type.outputs.skip != 'true') ||
          github.event_name == 'workflow_dispatch'
        id: release-please
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Informer om release-PR
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(echo '${{ steps.release-please.outputs.pr }}' | jq -r '.number')
          echo "::notice::Release-PR oppretta: https://github.com/${{ github.repository }}/pull/$PR_NUMBER"
          echo "Gå til PR-en, verifiser endringar, og merge når du er klar."
