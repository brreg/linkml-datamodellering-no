name: Release Please

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release-please
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  update-dates:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Oppdater datoannotasjonar
        run: |
          python3 src/assets/scripts/update-schema-dates.py \
            --config release-please-config.json

      - name: Commit og push oppdaterte datoar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add src/linkml/
            git commit -m "chore(*): oppdater datoannotasjonar etter release [skip ci]"
            git push
          else
            echo "Ingen endringar å committe"
          fi
