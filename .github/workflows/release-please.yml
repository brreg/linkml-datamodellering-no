name: Release Please

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created }}
    steps:
      # RELEASE_PLEASE_TOKEN (PAT frå ein admin-konto) brukast i staden for
      # GITHUB_TOKEN av to grunnar: (1) PR-ar/push gjort med GITHUB_TOKEN
      # utløyser ikkje andre workflows (GitHub sin loop-prevention), så
      # validate.yml sin required status check ville aldri køyrt på
      # release-PR-en; (2) admin-rollen står på bypass-lista for
      # review-kravet på main, så auto-merge (under) kan faktisk fullføre.
      - uses: googleapis/release-please-action@v5
        id: release-please
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Aktiver auto-merge på release-PR
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          PR_NUMBER=$(echo '${{ steps.release-please.outputs.pr }}' | jq -r '.number')
          gh pr merge "$PR_NUMBER" --auto --squash

  capture-validation:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # RELEASE_PLEASE_TOKEN brukast her av samme grunn som i release-please-
      # jobben: push til main med GITHUB_TOKEN blokkeras av branch-ruleset-en
      # («Changes must be made through a pull request»), sidan github-actions[bot]
      # ikkje står på bypass-lista (sjå specs/done/auto-merge-release-pr.md).
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 2
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Hent mcp-validator-image frå GHCR
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
          podman pull "$IMAGE"
          podman tag "$IMAGE" mcp-linkml-validator

      - name: Fang valideringsresultat
        run: python3 src/assets/scripts/run-schema-validation.py --config release-please-config.json

      - name: Commit og push valideringsresultat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add validation/
            git commit -m "chore(*): oppdater valideringsresultat etter release [skip ci]"
            git push
          else
            echo "Ingen endringar å committe"
          fi

  update-dates:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # RELEASE_PLEASE_TOKEN brukast her av samme grunn som i release-please-
      # jobben: push til main med GITHUB_TOKEN blokkeras av branch-ruleset-en
      # («Changes must be made through a pull request»), sidan github-actions[bot]
      # ikkje står på bypass-lista (sjå specs/done/auto-merge-release-pr.md).
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 2
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Oppdater datoannotasjonar
        run: |
          python3 src/assets/scripts/update-schema-dates.py \
            --config release-please-config.json

      - name: Oppdater DQV-kvalitetsmålingar
        run: |
          pip install --quiet pyyaml
          python3 src/assets/scripts/gen-dqv-measurements.py

      - name: Commit og push oppdaterte datoar og kvalitetsmålingar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add src/linkml/
            git commit -m "chore(*): oppdater datoannotasjonar og DQV-kvalitetsmålingar etter release [skip ci]"
            git push
          else
            echo "Ingen endringar å committe"
          fi
