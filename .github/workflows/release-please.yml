name: Release Please

# Automatisk release-flyt:
# 1. Push til main med semantisk commit (feat/fix) → release-please opprettar/oppdaterer release-PR
# 2. Brukar mergar release-PR → release-please opprettar faktiske releases og tags
# 3. capture-validation og update-dates køyrer automatisk etter release-oppretting
#
# Manuell trigger via workflow_dispatch er framleis tilgjengeleg for admin.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created }}
    steps:
      - name: Sjekk om siste commit skal trigge release-please
        id: check_commit_type
        if: github.event_name == 'push'
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qE '^(style|docs|chore|test|ci|build|perf|refactor)(\(.*\))?:'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Siste commit er ikkje ein release-utløysande type — hoppar over"
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Siste commit kan trigge release — held fram"

      - uses: googleapis/release-please-action@v5
        if: |
          (github.event_name == 'push' && steps.check_commit_type.outputs.skip != 'true') ||
          github.event_name == 'workflow_dispatch'
        id: release-please
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  capture-validation:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 2

      - name: Hent mcp-validator-image frå GHCR
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
          podman pull "$IMAGE"
          podman tag "$IMAGE" mcp-linkml-validator

      - name: Fang valideringsresultat
        run: python3 src/assets/scripts/run-schema-validation.py --config release-please-config.json

      - name: Commit og push valideringsresultat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add validation/
            git commit -m "chore(validering): oppdater validation-loggar etter release [skip ci]"
            git push
          else
            echo "Ingen endringar å committe"
          fi

  update-dates:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 2

      - name: Oppdater datoannotasjonar
        run: |
          python3 src/assets/scripts/update-schema-dates.py \
            --config release-please-config.json

      - name: Commit og push oppdaterte datoar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add src/linkml/
            git commit -m "chore(*): oppdater datoannotasjonar etter release [skip ci]"
            git push
          else
            echo "Ingen endringar å committe"
          fi
