name: Release Please

on:
  workflow_dispatch:

jobs:
  release-please:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created }}
    steps:
      # Manuelt trigga workflow brukar GITHUB_TOKEN (treng ikkje PAT).
      # Workflow må triggerast av ein admin via Actions → Release Please → Run workflow.
      # Admin må godkjenne og merge release-PR manuelt etter at workflow har oppretta den.
      # Versjonsbump vert automatisk bestemt frå Conventional Commits (feat/fix/BREAKING).
      - uses: googleapis/release-please-action@v5
        id: release-please
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Informer om release-PR
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(echo '${{ steps.release-please.outputs.pr }}' | jq -r '.number')
          echo "::notice::Release-PR oppretta: https://github.com/${{ github.repository }}/pull/$PR_NUMBER"
          echo "Gå til PR-en, verifiser endringar, og merge manuelt når validate.yml har passert."

  capture-validation:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # Manuell workflow: push til main med GITHUB_TOKEN er tillate etter at
      # release-PR er merga (commit skjer som del av release-prosessen).
      # Dette steget køyrer KUN etter at ein release er faktisk publisert.
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Hent mcp-validator-image frå GHCR
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
          podman pull "$IMAGE"
          podman tag "$IMAGE" mcp-linkml-validator

      - name: Fang valideringsresultat
        run: python3 src/assets/scripts/run-schema-validation.py --config release-please-config.json

      - name: Commit og push valideringsresultat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add validation/
            git commit -m "chore(*): oppdater valideringsresultat etter release [skip ci]"
            git push
          else
            echo "Ingen endringar å committe"
          fi

  # Kjent race condition mot generate.yml (vurdert 2026-06-21, medvite akseptert):
  # denne jobben pushar ein commit under src/linkml/ via GITHUB_TOKEN.
  # generate.yml triggas av push til main med path-filter src/linkml/**, og
  # vil derfor allereie ha starta éin gong på release-PR-merge-pushen — FØR
  # denne jobben sin eigen commit (med oppdaterte datoar/DQV/ModelDCAT-
  # modellelement) eksisterer. Resultatet er at generate.yml typisk køyrer
  # to gonger per release: éin gong på data frå før denne jobben, og éin gong
  # til (utløyst av denne jobben sin push) med korrekt data — den andre
  # køyringa overskriv GitHub Pages-publiseringa frå den første. Dette er
  # ressurssløsing (dobbel CI-køyring), men sjølvhelande/eventually consistent
  # — med eitt unntak: dersom den ANDRE (korrigerande) generate.yml-køyringa
  # feilar (t.d. ein datafeil introdusert av eit av skripta under), blir
  # portalen ståande på det eldre-men-gyldige innholdet frå første køyring
  # utan synleg feilmelding. Ingen workaround er implementert — koplinga
  # mellom dei to workflow-filene (t.d. via workflow_run) ville lagt unødig
  # kompleksitet/skjørheit på generate.yml sin enkle "push til src/linkml/**"-
  # trigger, som vanlege feature-PR-ar er avhengige av.
  update-dates:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # Manuell workflow: push til main med GITHUB_TOKEN er tillate etter at
      # release-PR er merga (commit skjer som del av release-prosessen).
      # Dette steget køyrer KUN etter at ein release er faktisk publisert.
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Oppdater datoannotasjonar
        run: |
          python3 src/assets/scripts/update-schema-dates.py \
            --config release-please-config.json

      - name: Oppdater DQV-kvalitetsmålingar
        run: |
          pip install --quiet pyyaml
          python3 src/assets/scripts/gen-dqv-measurements.py

      - name: Hent linkml-local-image frå GHCR
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/linkml-local:latest
          podman pull "$IMAGE"
          podman tag "$IMAGE" localhost/linkml-local:latest

      - name: Oppdater ModelDCAT-modellelement
        run: |
          podman run --rm \
            -v "$PWD:/work" -w /work \
            -e PYTHONWARNINGS=ignore -e HOME=/tmp --user root \
            localhost/linkml-local:latest \
            python3 src/assets/scripts/gen-modelldcat-elements.py

      - name: Commit og push oppdaterte datoar, kvalitetsmålingar og modellelement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add src/linkml/
            git commit -m "chore(*): oppdater datoannotasjonar, DQV-kvalitetsmålingar og ModelDCAT-modellelement etter release [skip ci]"
            git push
          else
            echo "Ingen endringar å committe"
          fi
