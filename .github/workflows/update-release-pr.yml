name: Update Release PR

# Automatisk oppdatering av release-PR med validation-loggar, datoannotasjonar,
# DQV-kvalitetsmålingar og ModelDCAT-modellelement.
#
# Trigger: når release-please-action opprettar eller oppdaterer ein release-PR
# (identifisert via 'autorelease: pending'-label).
#
# Formål: sikre at alle genererte artefaktar er inkluderte i release-PR-en før
# ho vert merga, slik at direkte push til main (som bryt branch protection) ikkje
# er nødvendig.

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  update-release-pr:
    if: "contains(github.event.pull_request.labels.*.name, 'autorelease: pending')"
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Hent mcp-validator-image frå GHCR
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
          podman pull "$IMAGE"
          podman tag "$IMAGE" mcp-linkml-validator

      - name: Fang valideringsresultat
        run: python3 src/assets/scripts/run-schema-validation.py --config release-please-config.json

      - name: Oppdater datoannotasjonar
        run: |
          python3 src/assets/scripts/update-schema-dates.py \
            --config release-please-config.json

      - name: Oppdater DQV-kvalitetsmålingar
        run: |
          pip install --quiet pyyaml
          python3 src/assets/scripts/gen-dqv-measurements.py

      - name: Hent linkml-local-image frå GHCR
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/linkml-local:latest
          podman pull "$IMAGE"
          podman tag "$IMAGE" localhost/linkml-local:latest

      - name: Oppdater ModelDCAT-modellelement
        run: |
          podman run --rm \
            -v "$PWD:/work" -w /work \
            -e PYTHONWARNINGS=ignore -e HOME=/tmp --user root \
            localhost/linkml-local:latest \
            python3 src/assets/scripts/gen-modelldcat-elements.py

      - name: Commit og push til release-PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add validation/ src/linkml/
            git commit -m "chore(*): oppdater validation-loggar, datoannotasjonar, DQV og ModelDCAT-element"
            git push
          else
            echo "Ingen endringar å committe"
          fi
