name: Generate and publish

# Kjent, akseptert race condition mot release-please.yml sin update-dates-
# jobb (kommentert der) — denne workflowen kan derfor køyre to gonger per
# release (éin gong på data frå før update-dates, éin gong korrigert).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/linkml/**'
      - 'src/assets/containers/Dockerfile.linkml'
      - 'src/assets/containers/Dockerfile.python'
      - 'src/assets/containers/Dockerfile.avrotize'
      - 'src/assets/containers/Dockerfile.asyncapi-cli'
      - 'src/assets/containers/requirements-python-test.txt'
      - 'src/assets/templates/**'
      - 'mkdocs/**'
      - 'README.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  checkout-source:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/upload-artifact@v7
        with:
          name: source
          path: |
            src/
            mkdocs/
            .github/
            Makefile
            README.md
          retention-days: 1

  ensure-images:
    name: "build-image / ${{ matrix.image.name }}"
    needs: [checkout-source]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - name: linkml-local
            dockerfile: src/assets/containers/Dockerfile.linkml
            make_target: build-docker-linkml
            hash_files: src/assets/containers/Dockerfile.linkml
          - name: python-pytest
            dockerfile: src/assets/containers/Dockerfile.python
            make_target: build-docker-python
            hash_files: |
              src/assets/containers/Dockerfile.python
              src/assets/containers/requirements-python-test.txt
          - name: avrotize-local
            dockerfile: src/assets/containers/Dockerfile.avrotize
            make_target: build-docker-avrotize
            hash_files: src/assets/containers/Dockerfile.avrotize
          - name: asyncapi-cli-local
            dockerfile: src/assets/containers/Dockerfile.asyncapi-cli
            make_target: build-docker-asyncapi
            hash_files: src/assets/containers/Dockerfile.asyncapi-cli
      fail-fast: false
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source

      - name: Logg inn på GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Cache ${{ matrix.image.name }} image
        id: cache-image
        uses: actions/cache@v6
        with:
          path: ${{ matrix.image.name }}.tar.zst
          key: ${{ matrix.image.name }}-${{ hashFiles(matrix.image.hash_files) }}

      - name: Sjekk om ${{ matrix.image.name }} finst i GHCR
        id: ghcr-check
        if: steps.cache-image.outputs.cache-hit == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ hashFiles(matrix.image.hash_files) }}
          skopeo inspect --format='exists' docker://"$IMAGE" >/dev/null 2>&1 && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT

      - name: Bygg ${{ matrix.image.name }} image
        if: steps.cache-image.outputs.cache-hit != 'true'
        run: |
          make ${{ matrix.image.make_target }}
          podman save localhost/${{ matrix.image.name }}:latest | zstd -T0 > ${{ matrix.image.name }}.tar.zst

      - name: Last inn ${{ matrix.image.name }} frå cache
        if: steps.cache-image.outputs.cache-hit == 'true' && steps.ghcr-check.outputs.exists != 'true'
        run: podman load < <(zstd -d -c ${{ matrix.image.name }}.tar.zst)

      - name: Push ${{ matrix.image.name }} til GHCR
        if: steps.ghcr-check.outputs.exists != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ hashFiles(matrix.image.hash_files) }}
          podman tag localhost/${{ matrix.image.name }}:latest "$IMAGE"
          podman push "$IMAGE"

  generate:
    name: "generate / ${{ matrix.domain }}"
    needs: [ensure-images]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: write
      packages: read
    strategy:
      matrix:
        domain: [ap-no, begrepskatalog, fair, fint, modellkatalog, ngr, oreg, samt]
      fail-fast: false
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source

      - name: Cache genererte artefaktar (${{ matrix.domain }})
        id: cache-generated
        uses: actions/cache@v6
        with:
          path: generated/${{ matrix.domain }}/
          key: v3-generated-${{ matrix.domain }}-${{ hashFiles(format('src/linkml/{0}/**', matrix.domain)) }}-infra-${{ hashFiles('src/assets/containers/Dockerfile.linkml', 'src/assets/containers/Dockerfile.avrotize', 'src/assets/containers/Dockerfile.asyncapi-cli', 'src/assets/templates/**', 'Makefile') }}

      - name: Gjenopprett linkml-local frå cache
        if: steps.cache-generated.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v6
        with:
          path: linkml-local.tar.zst
          key: linkml-local-${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}

      - name: Gjenopprett python-pytest frå cache
        if: steps.cache-generated.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v6
        with:
          path: python-pytest.tar.zst
          key: python-pytest-${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}

      - name: Gjenopprett avrotize-local frå cache
        if: steps.cache-generated.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v6
        with:
          path: avrotize-local.tar.zst
          key: avrotize-local-${{ hashFiles('src/assets/containers/Dockerfile.avrotize') }}

      - name: Gjenopprett asyncapi-cli-local frå cache
        if: steps.cache-generated.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v6
        with:
          path: asyncapi-cli-local.tar.zst
          key: asyncapi-cli-local-${{ hashFiles('src/assets/containers/Dockerfile.asyncapi-cli') }}

      - name: Logg inn på GHCR
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Last images inn i podman (cache eller GHCR)
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          load_image() {
            local tar="$1" local_tag="$2" ghcr_tag="$3"
            if [ -f "$tar" ]; then
              podman load < <(zstd -d -c "$tar")
            else
              echo "Cache miss for $tar — hentar frå GHCR: $ghcr_tag"
              podman pull "$ghcr_tag"
              podman tag "$ghcr_tag" "$local_tag"
            fi
          }
          load_image linkml-local.tar.zst localhost/linkml-local:latest \
            "ghcr.io/${{ github.repository_owner }}/linkml-local:${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}"
          load_image python-pytest.tar.zst localhost/python-pytest:latest \
            "ghcr.io/${{ github.repository_owner }}/python-pytest:${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}"
          load_image avrotize-local.tar.zst localhost/avrotize-local:latest \
            "ghcr.io/${{ github.repository_owner }}/avrotize-local:${{ hashFiles('src/assets/containers/Dockerfile.avrotize') }}"
          load_image asyncapi-cli-local.tar.zst localhost/asyncapi-cli-local:latest \
            "ghcr.io/${{ github.repository_owner }}/asyncapi-cli-local:${{ hashFiles('src/assets/containers/Dockerfile.asyncapi-cli') }}"

      - name: Generer alle artefaktar for ${{ matrix.domain }}
        if: steps.cache-generated.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # Køyr domene-target som genererer alle hovudartefaktar
          make domain-${{ matrix.domain }}

      - uses: actions/upload-artifact@v7
        with:
          name: generated-${{ matrix.domain }}
          path: generated/${{ matrix.domain }}/
          retention-days: 1

  publish:
    needs: [generate]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source

      - name: Last ned alle genererte artefaktar
        uses: actions/download-artifact@v8
        with:
          pattern: generated-*
          path: generated-merged/

      - name: Slå saman domene-artefaktar til generated/
        run: |
          mkdir -p generated/
          for domain in ap-no begrepskatalog fair fint modellkatalog ngr oreg samt; do
            if [ -d "generated-merged/generated-$domain" ]; then
              mv "generated-merged/generated-$domain" "generated/$domain"
            fi
          done

      - name: Cache mkdocs-local image
        id: cache-mkdocs
        uses: actions/cache@v6
        with:
          path: mkdocs-local.tar.zst
          key: mkdocs-local-${{ hashFiles('mkdocs/Dockerfile.mkdocs') }}
      - name: Bygg mkdocs-local image
        if: steps.cache-mkdocs.outputs.cache-hit != 'true'
        run: |
          make build-docker-mkdocs
          podman save localhost/mkdocs-local:latest | zstd -T0 > mkdocs-local.tar.zst
      - name: Last inn mkdocs-local image
        run: podman load < <(zstd -d -c mkdocs-local.tar.zst)

      - name: Cache mkdocs-build-cache
        uses: actions/cache@v6
        with:
          path: mkdocs/.cache/
          key: mkdocs-build-${{ hashFiles('src/linkml/**', 'src/assets/containers/Dockerfile.linkml', 'src/assets/templates/**', 'mkdocs/docs/stylesheets/**', 'mkdocs/docs/javascripts/**', 'mkdocs/overrides/**') }}
          restore-keys: mkdocs-build-

      - name: Publiser og bygg dokumentasjonsportal
        run: |
          make docs-publish
          make docs-build

      - name: Konfigurer GitHub Pages
        uses: actions/configure-pages@v6

      - name: Last opp Pages-artefakt
        uses: actions/upload-pages-artifact@v5
        with:
          path: mkdocs/site/

      - name: Deploy til GitHub Pages (forsøk 1)
        id: deploy-attempt-1
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Vent før retry (dersom forsøk 1 feila)
        if: steps.deploy-attempt-1.outcome == 'failure'
        run: |
          echo "::warning::GitHub Pages deployment feila — ventar 30 sekund før retry..."
          sleep 30

      - name: Deploy til GitHub Pages (forsøk 2)
        id: deploy-attempt-2
        if: steps.deploy-attempt-1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Vent før siste retry (dersom forsøk 2 feila)
        if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
        run: |
          echo "::warning::GitHub Pages deployment feila igjen — ventar 60 sekund før siste forsøk..."
          sleep 60

      - name: Deploy til GitHub Pages (forsøk 3 — siste)
        id: deploy
        if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
        uses: actions/deploy-pages@v5
