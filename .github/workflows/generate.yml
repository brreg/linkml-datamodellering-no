name: Generate and publish

# Kjent, akseptert race condition mot release-please.yml sin update-dates-
# jobb (kommentert der) — denne workflowen kan derfor køyre to gonger per
# release (éin gong på data frå før update-dates, éin gong korrigert).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/linkml/**'
      - 'src/assets/containers/Dockerfile.linkml'
      - 'src/assets/containers/Dockerfile.python'
      - 'src/assets/containers/Dockerfile.avrotize'
      - 'src/assets/containers/Dockerfile.asyncapi-cli'
      - 'src/assets/containers/requirements-python-test.txt'
      - 'src/assets/templates/**'
      - 'mkdocs/**'
      - 'README.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  checkout-source:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/upload-artifact@v7
        with:
          name: source
          path: |
            src/
            mkdocs/
            .github/
            Makefile
            README.md
          retention-days: 1

  ensure-images:
    needs: [checkout-source]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source
      - name: Logg inn på GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Cache linkml-local image
        id: cache-linkml
        uses: actions/cache@v6
        with:
          path: linkml-local.tar.zst
          key: linkml-local-${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}
      - name: Sjekk om linkml-local finst i GHCR
        id: ghcr-linkml
        if: steps.cache-linkml.outputs.cache-hit == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/linkml-local:${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}
          podman pull "$IMAGE" 2>/dev/null && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT
      - name: Bygg linkml-local image
        if: steps.cache-linkml.outputs.cache-hit != 'true'
        run: |
          make build-docker-linkml
          podman save localhost/linkml-local:latest | zstd -T0 > linkml-local.tar.zst
      - name: Last inn linkml-local frå cache
        if: steps.cache-linkml.outputs.cache-hit == 'true' && steps.ghcr-linkml.outputs.exists != 'true'
        run: podman load < <(zstd -d -c linkml-local.tar.zst)
      - name: Push linkml-local til GHCR
        if: steps.ghcr-linkml.outputs.exists != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/linkml-local:${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}
          podman tag localhost/linkml-local:latest "$IMAGE"
          podman push "$IMAGE"

      - name: Cache python-pytest image
        id: cache-python
        uses: actions/cache@v6
        with:
          path: python-pytest.tar.zst
          key: python-pytest-${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}
      - name: Sjekk om python-pytest finst i GHCR
        id: ghcr-python
        if: steps.cache-python.outputs.cache-hit == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/python-pytest:${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}
          podman pull "$IMAGE" 2>/dev/null && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT
      - name: Bygg python-pytest image
        if: steps.cache-python.outputs.cache-hit != 'true'
        run: |
          make python-build-docker
          podman save localhost/python-pytest:latest | zstd -T0 > python-pytest.tar.zst
      - name: Last inn python-pytest frå cache
        if: steps.cache-python.outputs.cache-hit == 'true' && steps.ghcr-python.outputs.exists != 'true'
        run: podman load < <(zstd -d -c python-pytest.tar.zst)
      - name: Push python-pytest til GHCR
        if: steps.ghcr-python.outputs.exists != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/python-pytest:${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}
          podman tag localhost/python-pytest:latest "$IMAGE"
          podman push "$IMAGE"

      - name: Cache avrotize-local image
        id: cache-avrotize
        uses: actions/cache@v6
        with:
          path: avrotize-local.tar.zst
          key: avrotize-local-${{ hashFiles('src/assets/containers/Dockerfile.avrotize') }}
      - name: Sjekk om avrotize-local finst i GHCR
        id: ghcr-avrotize
        if: steps.cache-avrotize.outputs.cache-hit == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/avrotize-local:${{ hashFiles('src/assets/containers/Dockerfile.avrotize') }}
          podman pull "$IMAGE" 2>/dev/null && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT
      - name: Bygg avrotize-local image
        if: steps.cache-avrotize.outputs.cache-hit != 'true'
        run: |
          make avrotize-build-docker
          podman save localhost/avrotize-local:latest | zstd -T0 > avrotize-local.tar.zst
      - name: Last inn avrotize-local frå cache
        if: steps.cache-avrotize.outputs.cache-hit == 'true' && steps.ghcr-avrotize.outputs.exists != 'true'
        run: podman load < <(zstd -d -c avrotize-local.tar.zst)
      - name: Push avrotize-local til GHCR
        if: steps.ghcr-avrotize.outputs.exists != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/avrotize-local:${{ hashFiles('src/assets/containers/Dockerfile.avrotize') }}
          podman tag localhost/avrotize-local:latest "$IMAGE"
          podman push "$IMAGE"

      - name: Cache asyncapi-cli-local image
        id: cache-asyncapi
        uses: actions/cache@v6
        with:
          path: asyncapi-cli-local.tar.zst
          key: asyncapi-cli-local-${{ hashFiles('src/assets/containers/Dockerfile.asyncapi-cli') }}
      - name: Sjekk om asyncapi-cli-local finst i GHCR
        id: ghcr-asyncapi
        if: steps.cache-asyncapi.outputs.cache-hit == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/asyncapi-cli-local:${{ hashFiles('src/assets/containers/Dockerfile.asyncapi-cli') }}
          podman pull "$IMAGE" 2>/dev/null && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT
      - name: Bygg asyncapi-cli-local image
        if: steps.cache-asyncapi.outputs.cache-hit != 'true'
        run: |
          make asyncapi-build-docker
          podman save localhost/asyncapi-cli-local:latest | zstd -T0 > asyncapi-cli-local.tar.zst
      - name: Last inn asyncapi-cli-local frå cache
        if: steps.cache-asyncapi.outputs.cache-hit == 'true' && steps.ghcr-asyncapi.outputs.exists != 'true'
        run: podman load < <(zstd -d -c asyncapi-cli-local.tar.zst)
      - name: Push asyncapi-cli-local til GHCR
        if: steps.ghcr-asyncapi.outputs.exists != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/asyncapi-cli-local:${{ hashFiles('src/assets/containers/Dockerfile.asyncapi-cli') }}
          podman tag localhost/asyncapi-cli-local:latest "$IMAGE"
          podman push "$IMAGE"

  generate:
    name: "generate / ${{ matrix.domain }}"
    needs: [ensure-images]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: write
      packages: read
    strategy:
      matrix:
        domain: [ap-no, begrepskatalog, fair, fint, modellkatalog, ngr, oreg, samt]
      fail-fast: false
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source

      - name: Cache genererte artefaktar (${{ matrix.domain }})
        id: cache-generated
        uses: actions/cache@v6
        with:
          path: generated/${{ matrix.domain }}/
          key: v3-generated-${{ matrix.domain }}-${{ hashFiles(format('src/linkml/{0}/**', matrix.domain)) }}-infra-${{ hashFiles('src/assets/containers/Dockerfile.linkml', 'src/assets/containers/Dockerfile.avrotize', 'src/assets/containers/Dockerfile.asyncapi-cli', 'src/assets/templates/**', 'Makefile') }}

      - name: Gjenopprett linkml-local frå cache
        if: steps.cache-generated.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v6
        with:
          path: linkml-local.tar.zst
          key: linkml-local-${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}

      - name: Gjenopprett python-pytest frå cache
        if: steps.cache-generated.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v6
        with:
          path: python-pytest.tar.zst
          key: python-pytest-${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}

      - name: Gjenopprett avrotize-local frå cache
        if: steps.cache-generated.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v6
        with:
          path: avrotize-local.tar.zst
          key: avrotize-local-${{ hashFiles('src/assets/containers/Dockerfile.avrotize') }}

      - name: Gjenopprett asyncapi-cli-local frå cache
        if: steps.cache-generated.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v6
        with:
          path: asyncapi-cli-local.tar.zst
          key: asyncapi-cli-local-${{ hashFiles('src/assets/containers/Dockerfile.asyncapi-cli') }}

      - name: Logg inn på GHCR
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Last images inn i podman (cache eller GHCR)
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          load_image() {
            local tar="$1" local_tag="$2" ghcr_tag="$3"
            if [ -f "$tar" ]; then
              podman load < <(zstd -d -c "$tar")
            else
              echo "Cache miss for $tar — hentar frå GHCR: $ghcr_tag"
              podman pull "$ghcr_tag"
              podman tag "$ghcr_tag" "$local_tag"
            fi
          }
          load_image linkml-local.tar.zst localhost/linkml-local:latest \
            "ghcr.io/${{ github.repository_owner }}/linkml-local:${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}"
          load_image python-pytest.tar.zst localhost/python-pytest:latest \
            "ghcr.io/${{ github.repository_owner }}/python-pytest:${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}"
          load_image avrotize-local.tar.zst localhost/avrotize-local:latest \
            "ghcr.io/${{ github.repository_owner }}/avrotize-local:${{ hashFiles('src/assets/containers/Dockerfile.avrotize') }}"
          load_image asyncapi-cli-local.tar.zst localhost/asyncapi-cli-local:latest \
            "ghcr.io/${{ github.repository_owner }}/asyncapi-cli-local:${{ hashFiles('src/assets/containers/Dockerfile.asyncapi-cli') }}"

      - name: Generer alle artefaktar for ${{ matrix.domain }}
        if: steps.cache-generated.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # Køyr domene-target som genererer alle hovudartefaktar
          make domain-${{ matrix.domain }}

      - uses: actions/upload-artifact@v7
        with:
          name: generated-${{ matrix.domain }}
          path: generated/
          retention-days: 1

  publish:
    needs: [generate]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source

      - name: Last ned alle genererte artefaktar
        uses: actions/download-artifact@v8
        with:
          pattern: generated-*
          path: generated/
          merge-multiple: true

      - name: Cache mkdocs-local image
        id: cache-mkdocs
        uses: actions/cache@v6
        with:
          path: mkdocs-local.tar.zst
          key: mkdocs-local-${{ hashFiles('mkdocs/Dockerfile.mkdocs') }}
      - name: Bygg mkdocs-local image
        if: steps.cache-mkdocs.outputs.cache-hit != 'true'
        run: |
          make build-docker-mkdocs
          podman save localhost/mkdocs-local:latest | zstd -T0 > mkdocs-local.tar.zst
      - name: Last inn mkdocs-local image
        run: podman load < <(zstd -d -c mkdocs-local.tar.zst)

      - name: Cache mkdocs-build-cache
        uses: actions/cache@v6
        with:
          path: mkdocs/.cache/
          key: mkdocs-build-${{ hashFiles('src/linkml/**', 'src/assets/containers/Dockerfile.linkml', 'src/assets/templates/**', 'mkdocs/docs/stylesheets/**', 'mkdocs/docs/javascripts/**', 'mkdocs/overrides/**') }}
          restore-keys: mkdocs-build-

      - name: Publiser og bygg dokumentasjonsportal
        run: |
          make docs-publish
          make docs-build

      - name: Konfigurer GitHub Pages
        uses: actions/configure-pages@v6

      - name: Last opp Pages-artefakt
        uses: actions/upload-pages-artifact@v5
        with:
          path: mkdocs/site/

      - name: Deploy til GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
