name: Flattar ut importar (gen-linkml)
description: Køyrer gen-linkml for å flatte ut importar for alle skjema i domenet

inputs:
  domain:
    description: Domenenamn (ap-no, fair, fint, ngr, oreg, samt)
    required: true

runs:
  using: composite
  steps:
    - name: Flattar ut importar (gen-linkml)
      shell: bash
      run: make domain-gen-linkml DOMAIN=${{ inputs.domain }}
