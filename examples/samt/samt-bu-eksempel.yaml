# --- Personer ---
rektorer:
  - identifikator: samtbuskole:rektor-1
    navn: Rektor Rasmus
    enhetsleder_for: samtbuskole:skole-1

elever:
  - identifikator: samtbuskole:elev-1
    navn: Ola Nordmann
