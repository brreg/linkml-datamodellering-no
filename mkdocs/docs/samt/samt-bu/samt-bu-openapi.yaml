openapi: 3.1.0
info:
  title: SAMT – Barnehagar og skular
  version: 0.0.0
  description: Ontodia-vennlig LinkML-modell for skoler
  contact:
    url: https://data.norge.no/samt/samt-bu
paths: {}
components:
