site_name: LinkML ap-no profiler, FAIR metadata, FINT, SAMT, Nasjonale grunndata og Offentlige resitre
site_description: Norske W3C-applikasjonsprofiler og domenemodeller i LinkML-format
site_url: https://example.org/linkml-w3c-no-profiles
docs_dir: docs

theme:
  name: material
  language: nb
  features:
    - navigation.indexes
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# gen-doc genererer interne lenkjer som ikkje alltid har tilsvarende .md-filer
# (t.d. lowercase-alias for PascalCase-klassefiler på case-insensitive filsystem).
# Desse åtvaringane er ikkje kritiske og vert undertrykka her.
validation:
  links:
    not_found: ignore
  nav:
    omitted_files: ignore

nav:
  - Heim: index.md
  - Rettleiingar:
      - Ny domenemodell: ny-domenemodell.md
  - 'AP-NO – Applikasjonsprofiler':
      - ap-no/index.md
      - 'cpsv-ap-no':
          - Oversikt: ap-no/cpsv-ap-no/index.md
          - Klasser: ap-no/cpsv-ap-no/klasser/index.md
      - 'dcat-ap-no':
          - Oversikt: ap-no/dcat-ap-no/index.md
          - Klasser: ap-no/dcat-ap-no/klasser/index.md
      - 'dqv-ap-no':
